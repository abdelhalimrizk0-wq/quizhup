<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوابة الكويزات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #060d1a;
    --surface: #0d1626;
    --card: #111e33;
    --border: #1e3050;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --text: #e2e8f0;
    --muted: #5a7399;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .blob1 {
    position: fixed; top:-200px; right:-150px;
    width:700px; height:700px;
    background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 65%);
    pointer-events:none; z-index:0;
  }
  .blob2 {
    position: fixed; bottom:-200px; left:-150px;
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 65%);
    pointer-events:none; z-index:0;
  }

  .wrap { position:relative; z-index:1; }

  /* ── HEADER ── */
  header {
    padding: 22px 48px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,13,26,0.85);
    backdrop-filter: blur(14px);
    position: sticky; top:0; z-index:100;
    display: flex; align-items:center; gap:14px;
  }

  .logo-icon {
    width:40px; height:40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    box-shadow: 0 0 20px rgba(99,102,241,0.35);
  }

  .logo-name {
    font-family: 'Tajawal', sans-serif;
    font-size:20px; font-weight:900;
  }
  .logo-name span { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    max-width: 900px; margin: 0 auto;
    padding: 72px 32px 48px;
    text-align: center;
    animation: fadeUp .6s ease both;
  }

  .hero-badge {
    display: inline-flex; align-items:center; gap:6px;
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.20);
    color: #93c5fd;
    border-radius:999px;
    padding: 6px 16px;
    font-size: 13px; font-weight:600;
    margin-bottom: 24px;
    letter-spacing:.3px;
  }

  .hero h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.18;
    margin-bottom: 16px;
  }

  .hero h1 .hl {
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--muted);
    font-size: 17px;
    line-height: 1.7;
    max-width: 520px; margin: 0 auto 40px;
  }

  /* stat chips */
  .hero-stats {
    display: flex; justify-content:center; gap:14px; flex-wrap:wrap;
  }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius:999px;
    padding: 8px 20px;
    font-size: 13px; font-weight:600;
    display:flex; align-items:center; gap:7px;
    color: var(--muted);
  }
  .stat-chip strong { color: var(--text); }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 560px; margin: 0 auto 56px;
    padding: 0 32px;
    animation: fadeUp .5s .1s ease both;
    opacity:0; animation-fill-mode:both;
  }

  .search-inner {
    position:relative;
  }

  .search-inner input {
    width:100%;
    padding: 15px 52px 15px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    outline:none;
    transition: border-color .25s, box-shadow .25s;
  }
  .search-inner input::placeholder { color: var(--muted); }
  .search-inner input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.13);
  }
  .search-inner .si {
    position:absolute; left:16px; top:50%;
    transform:translateY(-50%);
    color: var(--muted); font-size:17px;
    pointer-events:none;
  }

  /* ── SUBJECTS GRID ── */
  .section {
    max-width: 1050px; margin: 0 auto;
    padding: 0 32px 80px;
  }

  .section-label {
    font-size:12px; font-weight:700; letter-spacing:2px;
    color: var(--muted); text-transform:uppercase;
    margin-bottom:24px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  /* SUBJECT CARD */
  .s-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 26px;
    cursor:pointer;
    transition: transform .25s, border-color .25s, box-shadow .25s;
    position:relative; overflow:hidden;
    animation: fadeUp .5s ease both;
    opacity:0; animation-fill-mode:both;
  }

  .s-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 12px 36px rgba(59,130,246,0.14);
  }

  /* glow blob inside card */
  .s-card::before {
    content:''; position:absolute;
    top:-40px; right:-40px;
    width:140px; height:140px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    transition: transform .3s;
  }
  .s-card:hover::before { transform: scale(1.3); }

  .s-emoji { font-size:38px; margin-bottom:14px; display:block; }

  .s-name {
    font-family:'Tajawal',sans-serif;
    font-size:20px; font-weight:800;
    margin-bottom:6px;
  }

  .s-meta { color:var(--muted); font-size:13px; }

  .s-footer {
    margin-top:18px;
    display:flex; align-items:center; justify-content:space-between;
  }

  .s-badge {
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.20);
    color: #93c5fd;
    border-radius:999px;
    padding: 4px 12px;
    font-size:12px; font-weight:700;
  }

  .s-arrow {
    width:32px; height:32px;
    background: rgba(59,130,246,0.08);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color: var(--accent);
    opacity:0; transform:translateX(6px);
    transition: opacity .2s, transform .2s;
  }
  .s-card:hover .s-arrow { opacity:1; transform:translateX(0); }

  /* ── LECTURES PAGE ── */
  #page-lectures { display:none; }

  .back-btn {
    display:inline-flex; align-items:center; gap:8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius:10px;
    padding: 10px 18px;
    font-family:'Cairo',sans-serif;
    font-size:14px;
    cursor:pointer;
    transition: border-color .2s, background .2s;
    margin-bottom:36px;
  }
  .back-btn:hover { border-color:var(--accent); }

  .page-header {
    display:flex; align-items:center; gap:16px;
    margin-bottom:36px;
    animation:fadeUp .4s ease;
  }

  .page-icon {
    width:54px; height:54px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    box-shadow: 0 0 20px rgba(99,102,241,0.3);
    flex-shrink:0;
  }

  .page-info h2 {
    font-family:'Tajawal',sans-serif;
    font-size:28px; font-weight:900;
  }
  .page-info p { color:var(--muted); font-size:14px; margin-top:3px; }

  /* LECTURE LIST */
  .lec-list { display:flex; flex-direction:column; gap:12px; }

  .lec-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius:14px;
    padding: 20px 24px;
    display:flex; align-items:center; gap:16px;
    cursor:pointer;
    transition: transform .22s, border-color .22s, box-shadow .22s;
    animation:fadeUp .4s ease both; opacity:0; animation-fill-mode:both;
    text-decoration:none; color:inherit;
  }

  .lec-item:hover {
    transform: translateX(-4px);
    border-color: var(--accent);
    box-shadow: 0 6px 24px rgba(59,130,246,0.12);
  }

  .lec-num {
    min-width:46px; height:46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:16px;
    box-shadow: 0 0 14px rgba(59,130,246,0.28);
    flex-shrink:0;
  }

  .lec-info { flex:1; }
  .lec-name { font-size:16px; font-weight:700; }
  .lec-sub { color:var(--muted); font-size:13px; margin-top:3px; }

  .lec-cta {
    background: rgba(59,130,246,0.10);
    border: 1px solid rgba(59,130,246,0.22);
    color: #93c5fd;
    border-radius:8px;
    padding: 8px 18px;
    font-family:'Cairo',sans-serif;
    font-size:13px; font-weight:700;
    white-space:nowrap;
    cursor:pointer;
    transition: background .2s;
  }
  .lec-item:hover .lec-cta { background: rgba(59,130,246,0.20); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align:center; padding:60px 20px;
    color:var(--muted);
    animation:fadeUp .4s ease;
  }
  .empty-icon { font-size:50px; margin-bottom:12px; }
  .empty p { font-size:15px; }

  /* ── FOOTER ── */
  footer {
    text-align:center;
    padding: 30px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* stagger */
  .s-card:nth-child(1){animation-delay:.05s}
  .s-card:nth-child(2){animation-delay:.10s}
  .s-card:nth-child(3){animation-delay:.15s}
  .s-card:nth-child(4){animation-delay:.20s}
  .s-card:nth-child(5){animation-delay:.25s}
  .s-card:nth-child(6){animation-delay:.30s}

  .lec-item:nth-child(1){animation-delay:.04s}
  .lec-item:nth-child(2){animation-delay:.08s}
  .lec-item:nth-child(3){animation-delay:.12s}
  .lec-item:nth-child(4){animation-delay:.16s}
  .lec-item:nth-child(5){animation-delay:.20s}
  .lec-item:nth-child(6){animation-delay:.24s}
  .lec-item:nth-child(7){animation-delay:.28s}
  .lec-item:nth-child(8){animation-delay:.32s}

  @media(max-width:600px){
    header{ padding:18px 20px; }
    .hero{ padding:48px 20px 32px; }
    .search-wrap{ padding:0 20px; margin-bottom:36px; }
    .section{ padding:0 20px 60px; }
    .lec-cta{ display:none; }
  }
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="wrap">

<header>
  <div class="logo-icon">🎓</div>
  <div class="logo-name">Quiz<span>Hub</span></div>
</header>

<!-- ═══════════ HOME PAGE ═══════════ -->
<div id="page-home">

  <div class="hero">
    <div class="hero-badge">🎯 مراجعة تفاعلية</div>
    <h1>بوابة <span class="hl">الكويزات</span> التفاعلية</h1>
    <p>اختر المادة واللي تحب تذاكرها، وابدأ الكويز فوراً</p>
    <div class="hero-stats" id="hero-stats">
      <div class="stat-chip">⏳ جار التحميل...</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <span class="si">🔍</span>
      <input type="text" id="search" placeholder="ابحث عن مادة..." oninput="filterSubjects()" />
    </div>
  </div>

  <div class="section">
    <div class="section-label">المواد المتاحة</div>
    <div class="grid" id="subjects-grid"></div>
  </div>

</div>

<!-- ═══════════ LECTURES PAGE ═══════════ -->
<div id="page-lectures">
  <div class="section" style="padding-top:48px">
    <button class="back-btn" onclick="goHome()">← رجوع للمواد</button>
    <div class="page-header" id="lec-header"></div>
    <div class="lec-list" id="lec-list"></div>
  </div>
</div>

<footer>صُنع بـ ❤️ لمساعدتك في مذاكرتك</footer>

</div><!-- /wrap -->

<script>
let allSubjects = [];
let currentSubject = null;

// ── LOAD DATA ──
async function loadSubjects() {
  try {
    const res = await fetch('subjects.json?' + Date.now());
    allSubjects = await res.json();
    renderStats();
    renderSubjects(allSubjects);
  } catch(e) {
    document.getElementById('subjects-grid').innerHTML =
      `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <p>تعذّر تحميل البيانات. تأكد من رفع ملف subjects.json</p>
      </div>`;
  }
}

// ── STATS ──
function renderStats() {
  const totalLec = allSubjects.reduce((a,s) => a + s.lectures.length, 0);
  const totalQ   = allSubjects.reduce((a,s) =>
    a + s.lectures.reduce((b,l) => b + (l.questions || 0), 0), 0);
  document.getElementById('hero-stats').innerHTML = `
    <div class="stat-chip">📚 <strong>${allSubjects.length}</strong> مادة</div>
    <div class="stat-chip">📄 <strong>${totalLec}</strong> محاضرة</div>
    <div class="stat-chip">🎯 <strong>${totalQ}+</strong> سؤال</div>
  `;
}

// ── RENDER SUBJECTS ──
function renderSubjects(list) {
  const grid = document.getElementById('subjects-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <p>لا توجد نتائج مطابقة</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(s => `
    <div class="s-card" onclick="openSubject('${s.id}')">
      <span class="s-emoji">${s.emoji || '📚'}</span>
      <div class="s-name">${s.nameAr || s.name}</div>
      <div class="s-meta">📄 ${s.lectures.length} محاضرة</div>
      <div class="s-footer">
        <div class="s-badge">🎯 ${s.lectures.length} كويز</div>
        <div class="s-arrow">←</div>
      </div>
    </div>
  `).join('');
}

// ── SEARCH ──
function filterSubjects() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = allSubjects.filter(s =>
    (s.name + s.nameAr).toLowerCase().includes(q)
  );
  renderSubjects(filtered);
}

// ── OPEN SUBJECT ──
function openSubject(id) {
  const s = allSubjects.find(x => x.id === id);
  if (!s) return;
  currentSubject = s;

  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-lectures').style.display = 'block';

  // header
  document.getElementById('lec-header').innerHTML = `
    <div class="page-icon">${s.emoji || '📚'}</div>
    <div class="page-info">
      <h2>${s.nameAr || s.name}</h2>
      <p>${s.lectures.length} محاضرة متاحة</p>
    </div>
  `;

  const list = document.getElementById('lec-list');
  if (!s.lectures.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📄</div>
      <p>لا توجد محاضرات بعد</p>
    </div>`;
    return;
  }

  list.innerHTML = s.lectures.map((l, i) => `
    <a class="lec-item" href="${l.file}" target="_blank" rel="noopener">
      <div class="lec-num">${i + 1}</div>
      <div class="lec-info">
        <div class="lec-name">${l.nameAr || l.name}</div>
        <div class="lec-sub">${l.questions ? l.questions + ' سؤال' : 'اضغط لفتح الكويز'} · يفتح في تبويب جديد</div>
      </div>
      <div class="lec-cta">ابدأ الكويز ←</div>
    </a>
  `).join('');

  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── GO HOME ──
function goHome() {
  currentSubject = null;
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-lectures').style.display = 'none';
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── INIT ──
loadSubjects();
</script>
</body>
</html>
