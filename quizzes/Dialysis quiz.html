<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Dialysis Quiz</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            { id: 1, question: "What is the primary mechanism that facilitates water removal in hemodialysis machines?", options: ["Ultrafiltration process", "Diffusion process", "Osmosis process", "Secretion process"], correct: 0, rationale: "Ultrafiltration uses negative pressure to apply an actual suctioning force to the membrane, making it highly efficient for fluid removal." },
            { id: 2, question: "Which vascular access method requires one to four months to mature before it can be used for hemodialysis?", options: ["Arteriovenous fistula", "Arteriovenous graft", "Central venous catheter", "Subclavian catheter"], correct: 0, rationale: "Fistulas require from 1 to 4 months to mature before being used, whereas grafts and catheters are ready much sooner." },
            { id: 3, question: "Which symptom is a classic characteristic of disequilibrium syndrome?", options: ["Severe headache", "Sinus bradycardia", "Chronic hypertension", "Frequent polyuria"], correct: 0, rationale: "Disequilibrium syndrome is characterized by headache, disorientation, restlessness, blurred vision, confusion, and seizures due to cerebral edema." },
            { id: 4, question: "How long should nurses avoid administering injections to a patient after a hemodialysis session is completed?", options: ["Two to four hours", "One to two hours", "Four to six hours", "Six to eight hours"], correct: 0, rationale: "Injections are avoided for 2 to 4 hours to allow time for the metabolism and excretion of heparin to reach safe levels." },
            { id: 5, question: "Continuous renal replacement therapy is primarily used for critically ill patients who are hemodynamically unstable.", options: ["True", "False"], correct: 0, rationale: "CRRT is specifically indicated for unstable clients who cannot tolerate the rapid fluid shifts of standard hemodialysis." },
            { id: 6, question: "What substance is added to the dialysate in peritoneal dialysis to make it hypertonic and increase the osmotic effect?", options: ["Dextrose", "Sodium", "Calcium", "Acetate"], correct: 0, rationale: "Higher concentrations of dextrose increase the osmotic effect, drawing more water from the bloodstream." },
            { id: 7, question: "Which complication is frequently associated with the ultrafiltration phase during hemodialysis?", options: ["Hypotension", "Hypertension", "Hyperkalemia", "Hyperglycemia"], correct: 0, rationale: "Hypotension occurs during ultrafiltration dialysis because fluid removal is the primary goal, leading to rapid volume depletion." },
            { id: 8, question: "What sound indicates turbulent but expected blood flow when auscultating an arteriovenous access?", options: ["Loud bruit", "Faint crackle", "Dull thud", "High wheeze"], correct: 0, rationale: "A loud sound caused by turbulent blood flow in a functioning access is called a bruit." },
            { id: 9, question: "Which vein is commonly utilized for continuous renal replacement therapy?", options: ["Femoral vein", "Cephalic vein", "Basilic vein", "Radial vein"], correct: 0, rationale: "CRRT is done continuously via large veins, such as the femoral, internal jugular, or subclavian veins." },
            { id: 10, question: "The semipermeable membrane in dialysis allows the loss of red blood cells and proteins into the dialysate.", options: ["True", "False"], correct: 1, rationale: "Small pores in the semipermeable membrane do not allow the loss of red blood cells and large proteins." },
            { id: 11, question: "What specific dietary restriction is commonly recommended for a patient undergoing maintenance hemodialysis?", options: ["Low sodium diet", "High potassium diet", "High phosphorus diet", "Low carbohydrate diet"], correct: 0, rationale: "A diet that is low in sodium, potassium, and phosphorus is strictly recommended for hemodialysis patients." },
            { id: 12, question: "What is considered a major and potentially life threatening complication of peritoneal dialysis?", options: ["Peritonitis", "Encephalopathy", "Endocarditis", "Pancreatitis"], correct: 0, rationale: "Peritonitis is a major complication of peritoneal dialysis characterized by cloudy drainage, fever, and abdominal rigidity." },
            { id: 13, question: "Which type of peritoneal dialysis is performed automatically by a machine while the person sleeps?", options: ["Continuous cyclic", "Continuous ambulatory", "Intermittent nocturnal", "Acute intermittent"], correct: 0, rationale: "Continuous Cyclic Peritoneal Dialysis uses a machine to automatically fill and drain dialysate from the abdomen at night." },
            { id: 14, question: "The expected lifespan of an arteriovenous graft is typically three to five years with repeated use.", options: ["True", "False"], correct: 0, rationale: "Although the graft reseals after each puncture, its expected life is 3 to 5 years." },
            { id: 15, question: "What clinical finding does cloudy drainage fluid indicate during a peritoneal dialysis exchange?", options: ["Systemic infection", "High blood sugar", "Internal bleeding", "Severe dehydration"], correct: 0, rationale: "Cloudy or tinged fluid must be reported immediately as it is a primary indicator of peritonitis." },
            { id: 16, question: "Which condition serves as a contraindication for initiating peritoneal dialysis?", options: ["Abdominal adhesions", "Congestive heart failure", "Recent cerebral bleeding", "Severe fluid overload"], correct: 0, rationale: "Patients with extensive surgical scars or abdominal adhesions cannot undergo effective peritoneal dialysis." },
            { id: 17, question: "Which chemical is added to the dialysate to maintain and restore the acid base balance of the body?", options: ["Acetate", "Heparin", "Insulin", "Calcium"], correct: 0, rationale: "The body's buffer system is maintained by the addition of acetate, which diffuses into the blood and metabolizes to form bicarbonate." },
            { id: 18, question: "Patients undergoing hemodialysis should avoid sleeping on the arm equipped with the vascular access.", options: ["True", "False"], correct: 0, rationale: "Sleeping on the access arm can compress the vessels and obstruct blood flow, leading to clotting." },
            { id: 19, question: "Left shoulder pain occurring during peritoneal dialysis instillation is usually caused by what underlying factor?", options: ["Diaphragmatic irritation", "Myocardial infarction", "Catheter displacement", "Severe muscle spasm"], correct: 0, rationale: "Pain in the left shoulder may result from diaphragmatic irritation caused by the high concentration of glucose in the solution." },
            { id: 20, question: "How much dialysate is typically instilled into the abdomen during a continuous ambulatory peritoneal dialysis exchange?", options: ["Two thousand milliliters", "One thousand milliliters", "Three thousand milliliters", "Five hundred milliliters"], correct: 0, rationale: "Approximately 2000 ml of dialysate is instilled by gravity through the catheter in 30 to 40 minutes." },
            { id: 21, question: "Which scientific principle involves the movement of particles from an area of greater concentration to an area of lesser concentration?", options: ["Diffusion process", "Osmosis process", "Ultrafiltration process", "Secretion process"], correct: 0, rationale: "Diffusion means movement of particles from an area of greater to lesser concentration." },
            { id: 22, question: "Which of the following conditions is categorized as a long term complication of maintenance hemodialysis?", options: ["Amyloid deposits", "Pulmonary embolism", "Liver cirrhosis", "Peptic ulceration"], correct: 0, rationale: "Long term complications include amyloid deposits, neuropathy, anemia, calcium deposits, and cardiovascular disease." },
            { id: 23, question: "An arteriovenous graft can safely be used for hemodialysis immediately following its surgical insertion.", options: ["True", "False"], correct: 1, rationale: "An arteriovenous graft can be used 14 days after its insertion, not immediately." },
            { id: 24, question: "What specific type of protein should a hemodialysis patient consume to maintain a positive nitrogen balance?", options: ["High biologic quality", "Low biologic quality", "Plant based quality", "Synthetic supplements"], correct: 0, rationale: "Protein must be of high biologic quality composed of essential amino acids (eggs, meat, fish)." },
            { id: 25, question: "How frequently should a nurse provide oral care for a renal failure patient experiencing restricted oral intake?", options: ["Every four hours", "Every eight hours", "Every twelve hours", "Once every day"], correct: 0, rationale: "The nurse assists the client to provide mouth care after each meal and at bedtime or every 4 hours while awake." },
            { id: 26, question: "Which medication classification should generally be withheld on the morning of a hemodialysis treatment?", options: ["Antihypertensive drugs", "Antibiotic drugs", "Bronchodilator drugs", "Corticosteroid drugs"], correct: 0, rationale: "Antihypertensive drugs taken on dialysis day may cause a dangerously low blood pressure during the procedure." },
            { id: 27, question: "Which laboratory value is routinely monitored after dialysis as a primary indicator of treatment efficiency?", options: ["Serum creatinine", "Serum bilirubin", "Serum amylase", "Serum troponin"], correct: 0, rationale: "BUN and Creatinine are primary indicators of the efficiency of the dialysis procedure." },
            { id: 28, question: "Peritoneal dialysis provides patients with the opportunity to consume a more liberal dietary fluid intake compared to hemodialysis.", options: ["True", "False"], correct: 0, rationale: "PD patients have more opportunities to eat a liberal diet and usually have an increased fluid allowance." },
            { id: 29, question: "What is the typical total weekly time spent receiving intermittent peritoneal dialysis treatments?", options: ["Thirty six hours", "Twenty four hours", "Forty eight hours", "Seventy two hours"], correct: 0, rationale: "The total time spent on intermittent peritoneal dialysis is between 36 and 42 hours per week." },
            { id: 30, question: "What is the appropriate initial nursing action if a peritoneal dialysis infusion is running slower than expected?", options: ["Reposition the patient", "Increase the pressure", "Remove the catheter", "Administer a diuretic"], correct: 0, rationale: "If the infusion is slow, the nurse asks the client to move from side to side before seeking physician intervention." },
            { id: 31, question: "Disequilibrium syndrome is triggered by a rapid increase in the concentration of solutes in the blood during dialysis.", options: ["True", "False"], correct: 1, rationale: "It is caused when the concentrations of solutes in the blood are lowered rapidly, causing water to flood the brain tissue." },
            { id: 32, question: "What term describes the specific period when fluid remains inside the peritoneal cavity during a dialysis exchange?", options: ["Dwell time", "Fill phase", "Drain period", "Rest cycle"], correct: 0, rationale: "Dwell refers to the time the dialysate fluid remains in the peritoneal cavity to allow for diffusion and osmosis." },
            { id: 33, question: "To what target temperature should the dialysate solution be warmed prior to abdominal instillation?", options: ["Body temperature", "Room temperature", "Refrigerator temperature", "Boiling temperature"], correct: 0, rationale: "Dialysate solution is warmed approximately to body temperature to promote vessel dilation and patient comfort." },
            { id: 34, question: "What specific psychological concern is frequently documented among patients requiring long term hemodialysis?", options: ["Fear of dying", "Manic episodes", "Delusional thinking", "Visual hallucinations"], correct: 0, rationale: "Patients often face psychosocial issues including depression, impotence, financial problems, and fear of dying." },
            { id: 35, question: "Heparin is routinely administered during peritoneal dialysis to prevent clotting within the abdominal cavity.", options: ["True", "False"], correct: 1, rationale: "Peritoneal dialysis does not require heparinization, making it ideal for patients with recent bleeding." },
            { id: 36, question: "What physiological change causes hypotension and an increased pulse rate during peritoneal dialysis instillation?", options: ["Rapid fluid shift", "Excessive bleeding", "Allergic reaction", "Systemic infection"], correct: 0, rationale: "Rapid shifts in fluid may happen because the dialysate has a high concentration of glucose, pulling fluid quickly." },
            { id: 37, question: "Which clinical manifestation is a hallmark symptom of disequilibrium syndrome?", options: ["Severe restlessness", "Sinus bradycardia", "High hyperthermia", "Chronic diarrhea"], correct: 0, rationale: "Symptoms include headache, disorientation, restlessness, blurred vision, confusion, and seizures." },
            { id: 38, question: "Which vascular access method exhibits the highest overall incidence of severe infection?", options: ["Tunneled catheter", "Arteriovenous fistula", "Arteriovenous graft", "Radial artery line"], correct: 0, rationale: "Tunneled central venous catheters have disadvantages including a high incidence of infection." },
            { id: 39, question: "How long does an entire continuous cyclic peritoneal dialysis treatment session typically last?", options: ["Ten hours", "Four hours", "Twenty hours", "Two hours"], correct: 0, rationale: "CCPD is performed over a 10 to 12 hour period, usually while the patient sleeps." },
            { id: 40, question: "Continuous renal replacement therapy filters blood rapidly over a period of two to three hours.", options: ["True", "False"], correct: 1, rationale: "CRRT is used 24 hours per day over several days to slowly remove fluid and solutes." },
            { id: 41, question: "Which dermatological condition places renal failure patients at high risk for impaired skin integrity?", options: ["Severe pruritus", "Distal cyanosis", "Hepatic jaundice", "Patchy erythema"], correct: 0, rationale: "Patients have a risk for impaired skin integrity related to scratching secondary to severe pruritus." },
            { id: 42, question: "Which method of vascular access utilizes a synthetic material tube to connect an artery and a vein?", options: ["Arteriovenous graft", "Arteriovenous fistula", "Central venous catheter", "Peripheral venous catheter"], correct: 0, rationale: "An arteriovenous graft uses a tube of synthetic material (e.g., Gore-Tex) to connect a vein and artery." },
            { id: 43, question: "Which serious complication commonly occurs in the interdialytic period between scheduled hemodialysis treatments?", options: ["Pulmonary edema", "Severe hypokalemia", "High hyperglycemia", "Sinus bradycardia"], correct: 0, rationale: "Between treatments, patients can develop edema, hypertension, hyperkalemia, and pulmonary edema." },
            { id: 44, question: "A palpable thrill is considered a normal and expected assessment finding over a functioning arteriovenous fistula.", options: ["True", "False"], correct: 0, rationale: "The nurse palpates for a thrill (vibration) over the vascular access, which confirms proper blood flow." },
            { id: 45, question: "What is the primary operational purpose of negative pressure within the hemodialysis machine?", options: ["Facilitate water removal", "Increase blood flow rate", "Prevent blood clotting", "Enhance solute diffusion"], correct: 0, rationale: "Negative pressure acts as an actual suctioning force applied to the membrane to facilitate the removal of water (ultrafiltration)." },
            { id: 46, question: "Which dietary electrolyte must be strictly restricted to prevent fatal complications in end stage renal disease?", options: ["Dietary potassium", "Dietary calcium", "Dietary magnesium", "Dietary zinc"], correct: 0, rationale: "Hyperkalemia is a severe issue; potassium restriction is vital and sources usually found in fresh fruits and vegetables must be limited." },
            { id: 47, question: "What type of soap is therapeutically recommended for a patient experiencing pruritus secondary to renal failure?", options: ["Glycerin based soap", "Antibacterial hand soap", "Scented body wash liquid", "Exfoliating skin scrub"], correct: 0, rationale: "Nursing interventions include limiting bathing to less than half an hour using lukewarm water and glycerin based soap." },
            { id: 48, question: "Which specific pharmacological agent is administered to dialysis patients to act as a phosphate binder?", options: ["Oral amphogel", "Injectable epogen", "Subcutaneous insulin", "Intravenous heparin"], correct: 0, rationale: "Phosphate binders such as Amphogel are administered while limiting phosphorus-containing foods." },
            { id: 49, question: "What specific vital sign alteration indicates a potential complication caused by rapid fluid shifting during peritoneal dialysis?", options: ["Increased pulse rate", "Decreased temperature", "Elevated oxygen level", "Reduced breathing rate"], correct: 0, rationale: "A drop in blood pressure and increased pulse rate are associated with rapid shifts in fluid caused by hypertonic dialysate." },
            { id: 50, question: "What blood pressure reading represents the expected target outcome for a patient managing chronic renal failure?", options: ["One hundred forty over ninety", "One hundred twenty over eighty", "One hundred sixty over one hundred", "Ninety over sixty"], correct: 0, rationale: "The evaluation and expected outcome states that blood pressure is maintained around 140/90 mm Hg for these patients." }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        // Final outer shuffle for the questions to completely randomize topics
        for (let i = quizData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
        }

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
