<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">First Aid in Breathing Emergencies</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                id: 1,
                question: "What is the priority intervention for a conscious patient experiencing a severe asthma attack?",
                options: ["Lay the patient flat on their back", "Sit the patient upright comfortably", "Encourage the patient to walk around", "Offer the patient a drink of water"],
                correct: 1,
                rationale: "Placing the victim in the most comfortable position for breathing, usually sitting upright, is the priority intervention to facilitate chest expansion."
            },
            {
                id: 2,
                question: "Which of the following is a sign of effective breathing?",
                options: ["Skin color is normal", "Breathing is noisy or raspy", "Chest movement is uneven", "Victim is gasping for air"],
                correct: 0,
                rationale: "Signs of effective breathing include normal skin color, quiet breathing, and equal expansion of both sides of the chest."
            },
            {
                id: 3,
                question: "When using a metered-dose inhaler, how long should the victim hold their breath after inhaling the medication?",
                options: ["2 seconds", "5 seconds", "10 seconds", "30 seconds"],
                correct: 2,
                rationale: "The victim should hold their breath for 10 seconds so the medication can spread out effectively in the lungs."
            },
            {
                id: 4,
                question: "True or False: A person with a completely blocked airway can speak in whispers.",
                options: ["True", "False"],
                correct: 1,
                rationale: "False. With a completely blocked airway, there is no air exchange, so coughing, breathing, and speaking are impossible."
            },
            {
                id: 5,
                question: "What is the correct site for injecting an epinephrine auto-injector?",
                options: ["Upper arm", "Mid-outer thigh", "Abdomen", "Buttocks"],
                correct: 1,
                rationale: "The auto-injector should be pressed firmly into the mid-outer thigh until the unit activates."
            },
            {
                id: 6,
                question: "Which symptom suggests a severe obstruction rather than a mild one in a choking victim?",
                options: ["Forceful coughing", "Ability to speak", "High-pitched noise or no noise", "Flushed face"],
                correct: 2,
                rationale: "A severe obstruction is characterized by weak or no coughing, inability to speak, and high-pitched noise or silence."
            },
            {
                id: 7,
                question: "What is the immediate priority after administering an EpiPen injection?",
                options: ["Have the victim stand up and walk", "Call for emergency medical help", "Administer a second dose immediately", "Give the victim water to drink"],
                correct: 1,
                rationale: "Call 123 (medical help) as soon as you have given the first dose. The victim requires urgent medical attention."
            },
            {
                id: 8,
                question: "What physiological change occurs in the lungs during an asthma attack?",
                options: ["Airways widen significantly", "Muscles of air passages spasm", "Lungs fill with fluid immediately", "Diaphragm stops moving"],
                correct: 1,
                rationale: "In an asthma attack, the muscles of the air passages go into spasm, causing narrowing of the airways."
            },
            {
                id: 9,
                question: "Which of the following is a common trigger for asthma?",
                options: ["Warm dry air", "Pet dander", "Drinking water", "Resting quietly"],
                correct: 1,
                rationale: "Common asthma triggers include pet dander, cold, upper airway infections, insect bites, and pollen."
            },
            {
                id: 10,
                question: "True or False: Cyanosis is a sign that a person is receiving effective oxygenation.",
                options: ["True", "False"],
                correct: 1,
                rationale: "False. Cyanosis (blue lips/ears) indicates hypoxia and ineffective breathing."
            },
            {
                id: 11,
                question: "What is the first step in the protocol for a conscious adult with a severe airway obstruction?",
                options: ["Start chest compressions", "Perform 5 back blows", "Perform 5 abdominal thrusts", "Offer water to clear the throat"],
                correct: 1,
                rationale: "If the casualty cannot cough forcefully, speak, or breathe, first use back blows followed by abdominal thrusts."
            },
            {
                id: 12,
                question: "Why should a victim avoid standing up suddenly after receiving epinephrine for anaphylaxis?",
                options: ["It may cause a drop in blood pressure", "It will deactivate the medication", "It causes muscle cramps", "It triggers vomiting"],
                correct: 0,
                rationale: "It is important the victim does not sit or stand immediately as this could cause a sudden drop in blood pressure."
            },
            {
                id: 13,
                question: "Which condition is classified as a breathing emergency caused by a medical condition?",
                options: ["Broken ribs", "Inhaled poison", "Pneumonia", "Gunshot wound"],
                correct: 2,
                rationale: "Pneumonia is listed as a medical condition causing breathing emergencies, unlike injuries or poisoning."
            },
            {
                id: 14,
                question: "How should you position your hands for abdominal thrusts?",
                options: ["On the sternum", "At the belly button in line with hips", "Below the navel", "On the ribcage"],
                correct: 1,
                rationale: "Make a fist and place it on the victim's abdomen at the belly button, in line with the hip bones."
            },
            {
                id: 15,
                question: "True or False: Breathing that is too fast or too slow is a sign of ineffective breathing.",
                options: ["True", "False"],
                correct: 0,
                rationale: "True. Abnormal breathing rates (too fast or too slow) are key indicators of ineffective breathing."
            },
            {
                id: 16,
                question: "What is the primary mechanism of action for abdominal thrusts?",
                options: ["Compressing the heart", "Creating an artificial cough", "Relaxing the throat muscles", "Inducing vomiting"],
                correct: 1,
                rationale: "Abdominal thrusts push the diaphragm up quickly to create an artificial cough that forces air out to dislodge the object."
            },
            {
                id: 17,
                question: "What is the priority action if a choking victim becomes unconscious?",
                options: ["Continue abdominal thrusts", "Lower them to the ground and start CPR", "Wait for medical help to arrive", "Check the pulse for one minute"],
                correct: 1,
                rationale: "If the casualty becomes unconscious, lower them to the ground, call for help, and begin chest compressions immediately."
            },
            {
                id: 18,
                question: "Which sign indicates that a victim is struggling for breath?",
                options: ["Speaking in full sentences", "Alert and relaxed appearance", "Using accessory muscles or gasping", "Normal skin tone"],
                correct: 2,
                rationale: "Struggling for breath, gasping, and using extra effort are signs of ineffective breathing."
            },
            {
                id: 19,
                question: "How many back blows should be delivered before switching to abdominal thrusts?",
                options: ["Two", "Five", "Ten", "Fifteen"],
                correct: 1,
                rationale: "The protocol specifies giving up to five back blows followed by five abdominal thrusts."
            },
            {
                id: 20,
                question: "True or False: Anaphylaxis can develop rapidly within seconds of exposure.",
                options: ["True", "False"],
                correct: 0,
                rationale: "True. Anaphylaxis is a severe reaction that can occur within seconds, minutes, or hours."
            },
            {
                id: 21,
                question: "What is a common cause of choking in the elderly population?",
                options: ["Small toys", "Buttons", "Food or pills", "Running while eating"],
                correct: 2,
                rationale: "In elderly people, common causes of choking include food and pills."
            },
            {
                id: 22,
                question: "Which of the following is a symptom of a severe allergic reaction?",
                options: ["Mild itching only", "Swelling of the face and tongue", "Slight sneezing", "Normal blood pressure"],
                correct: 1,
                rationale: "Severe reactions involve swelling of the face, neck, lips, and tongue, and potentially internal swelling."
            },
            {
                id: 23,
                question: "When performing CPR on an unconscious choking victim, when should you check the mouth?",
                options: ["Before starting compressions", "After every 30 compressions", "After every 2 breaths", "Only if you see the object"],
                correct: 1,
                rationale: "After the first 30 compressions, check the mouth for a foreign object before attempting ventilations."
            },
            {
                id: 24,
                question: "What color does the face typically turn when air supply is completely cut off?",
                options: ["Red then grey/blue", "Yellow then white", "Pale then pink", "Green then purple"],
                correct: 0,
                rationale: "The face flushes red initially, then turns grey with blue lips (cyanosis) as oxygen is depleted."
            },
            {
                id: 25,
                question: "True or False: You should perform abdominal thrusts on a person who is coughing forcefully.",
                options: ["True", "False"],
                correct: 1,
                rationale: "False. If the victim can cough forcefully, the obstruction is mild. Encourage them to cough; do not interfere with thrusts yet."
            },
            {
                id: 26,
                question: "What is the correct way to hold an auto-injector before use?",
                options: ["With thumb over the orange tip", "Firmly with orange tip downward", "With fingertips only", "Horizontally with two hands"],
                correct: 1,
                rationale: "Hold it firmly with the orange tip downward. Avoid placing thumb over the ends."
            },
            {
                id: 27,
                question: "Which of the following is a 'poisoning' cause of breathing emergencies?",
                options: ["Carbon monoxide inhalation", "Asthma", "Chest compression", "Head injury"],
                correct: 0,
                rationale: "Inhaled poisons like carbon monoxide or hydrogen sulfide are classified under poisoning causes."
            },
            {
                id: 28,
                question: "What sound is most commonly associated with an asthma attack?",
                options: ["Gurgling", "Wheezing", "Snoring", "Clicking"],
                correct: 1,
                rationale: "Coughing and wheezing are classic signs and symptoms of an asthma attack."
            },
            {
                id: 29,
                question: "If a choking victim is pregnant or obese, what modification might be necessary?",
                options: ["Use chest thrusts instead", "Wait for unconsciousness", "Use only back blows", "Do nothing"],
                correct: 0,
                rationale: "While not explicitly detailed in every step of this specific text, standard first aid logic implies chest thrusts for those you cannot encircle, but based strictly on this text, we stick to the provided anatomy: 'abdomen at belly button'."
            },
            {
                id: 30,
                question: "What defines 'cyanosis' in a breathing emergency?",
                options: ["Redness of the skin", "Blue tinge to lips and nailbeds", "Yellowing of the eyes", "Pale and clammy skin"],
                correct: 1,
                rationale: "Cyanosis is described as a gray-blue tinge to the lips, earlobes, and fingernail beds."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
