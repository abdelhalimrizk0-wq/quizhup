<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">First Aid in Burns</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 30 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                id: 1,
                question: "Which layer of the skin contains blood vessels, nerves, and connective tissue?",
                options: ["Epidermis", "Dermis", "Hypodermis", "Subcutaneous layer"],
                correct: 1,
                rationale: "The Dermis is the middle layer containing blood vessels, nerves, and connective tissue."
            },
            {
                id: 2,
                question: "What is the primary action a rescuer must take before approaching a burn victim?",
                options: ["Assess the burn degree", "Ascertain their own safety", "Apply cool water", "Check for a pulse"],
                correct: 1,
                rationale: "The first priority in any emergency is to ascertain your own safety before approaching the victim."
            },
            {
                id: 3,
                question: "The Rule of Palms estimates that the patient's palm represents 10% of the total body surface area.",
                options: ["True", "False"],
                correct: 1,
                rationale: "False. The Rule of Palms estimates that the patient's hand (palm and fingers) represents approximately 1% of the total body surface area."
            },
            {
                id: 4,
                question: "Which type of burn is caused by contact with strong acids or bases?",
                options: ["Thermal Burns", "Radiation Burns", "Chemical Burns", "Friction Burns"],
                correct: 2,
                rationale: "Chemical burns result from contact with strong acids, bases, or other corrosive substances."
            },
            {
                id: 5,
                question: "According to the Rule of Nines for adults, what percentage is assigned to the anterior trunk?",
                options: ["9%", "18%", "36%", "4.5%"],
                correct: 1,
                rationale: "The trunk is 36% total, split into 18% for the anterior (front) and 18% for the posterior (back)."
            },
            {
                id: 6,
                question: "What is the recommended temperature for water used to cool a burn?",
                options: ["5°C to 10°C", "15°C to 20°C", "25°C to 30°C", "0°C to 5°C"],
                correct: 1,
                rationale: "The water temperature should be between 15°C and 20°C for maximum effectiveness."
            },
            {
                id: 7,
                question: "Applying ice directly to a burn is recommended to reduce swelling rapidly.",
                options: ["True", "False"],
                correct: 1,
                rationale: "False. Don't apply ice or iced water as it can cause more tissue damage."
            },
            {
                id: 8,
                question: "Which symptom is most characteristic of a second-degree burn?",
                options: ["Redness with no blisters", "Charred or white skin", "Blisters and intense pain", "Complete tissue destruction"],
                correct: 2,
                rationale: "Second-degree burns penetrate deeper than the first layer, resulting in blisters, intense pain, swelling, and redness."
            },
            {
                id: 9,
                question: "What is the first step if a person's clothing is on fire?",
                options: ["Run to find water", "Instruct them to stop drop and roll", "Remove the clothing immediately", "Wrap them in a blanket"],
                correct: 1,
                rationale: "If clothing is on fire, instruct the victim to 'stop, drop, and roll' to extinguish the flames."
            },
            {
                id: 10,
                question: "Why should greasy substances like butter or oil be avoided on burns?",
                options: ["They cool the burn too quickly", "They seal heat in and introduce bacteria", "They cause an allergic reaction", "They make the skin too slippery for bandages"],
                correct: 1,
                rationale: "Greasy substances can seal heat in and introduce bacteria, worsening the injury."
            },
            {
                id: 11,
                question: "For a 5-year-old child, how much is added to the percentage of each leg according to the adjusted Rule of Nines?",
                options: ["0.5%", "1%", "2%", "4%"],
                correct: 2,
                rationale: "For each year above one (4 years difference for a 5-year-old), add 0.5% to each leg. 4 years * 0.5% = +2%."
            },
            {
                id: 12,
                question: "Which layer of the skin is the outermost protective layer?",
                options: ["Dermis", "Hypodermis", "Epidermis", "Subcutaneous tissue"],
                correct: 2,
                rationale: "The Epidermis is the outer protective layer that produces new skin cells and forms a barrier."
            },
            {
                id: 13,
                question: "What is the immediate management for a third-degree burn while waiting for help?",
                options: ["Apply burn gel liberally", "Immerse in cold water for 20 minutes", "Do not apply anything to the burn", "Massage the area to improve circulation"],
                correct: 2,
                rationale: "For third and fourth-degree burns, do not apply anything. Call for emergency help immediately."
            },
            {
                id: 14,
                question: "Friction burns are also commonly known as abrasions or road rash.",
                options: ["True", "False"],
                correct: 0,
                rationale: "True. Friction burns occur when skin rubs forcefully against a rough surface and are known as abrasions."
            },
            {
                id: 15,
                question: "How long should a burn be immersed in cool running water?",
                options: ["5 minutes", "10 minutes", "At least 20 minutes", "Until the pain stops completely"],
                correct: 2,
                rationale: "Immerse the burned area in cool, running water for at least 20 minutes to minimize tissue damage."
            },
            {
                id: 16,
                question: "Which of the following requires seeking immediate medical attention regardless of burn size?",
                options: ["Redness on the arm", "Burns causing white or charred skin", "Small blisters on the finger", "Sunburn on the back"],
                correct: 1,
                rationale: "Burns that cause white or charred skin indicate a deep burn and require immediate medical attention."
            },
            {
                id: 17,
                question: "What is the correct action for clothing that is stuck to a burn wound?",
                options: ["Peel it off gently", "Soak it in oil then remove", "Leave it for professionals to remove", "Cut around it and pull it off"],
                correct: 2,
                rationale: "Don't peel off burned clothing stuck to the skin; leave it for medical professionals to remove safely."
            },
            {
                id: 18,
                question: "Why must jewelry be removed from a burned area immediately?",
                options: ["To prevent damage to the jewelry", "To allow for proper cleaning", "To prevent injury from rapid swelling", "To apply burn cream effectively"],
                correct: 2,
                rationale: "Burns can cause rapid swelling, which may lead to circulation problems if restrictive items aren't removed."
            },
            {
                id: 19,
                question: "Which type of dressing is recommended for covering a burn?",
                options: ["Cotton wool", "Non-adherent paraffin gauze", "Adhesive plastic bandage", "Dry paper towel"],
                correct: 1,
                rationale: "Choose a non-adherent dressing material specifically designed for burns, such as paraffin gauze."
            },
            {
                id: 20,
                question: "In the case of an electrical burn, what is the first priority?",
                options: ["Pull the victim away", "Pour water on the burn", "Disconnect the power source", "Start CPR immediately"],
                correct: 2,
                rationale: "Disconnect the power source before touching the victim to avoid electrocution."
            },
            {
                id: 21,
                question: "Fourth-degree burns extend into underlying tissues such as muscles and bones.",
                options: ["True", "False"],
                correct: 0,
                rationale: "True. Fourth-degree burns are the most severe, extending through all skin layers into muscle and bone."
            },
            {
                id: 22,
                question: "Which medication is suggested for pain management in burn first aid?",
                options: ["Aspirin", "Ibuprofen", "Antibiotics", "Steroids"],
                correct: 1,
                rationale: "Offer pain relievers like ibuprofen or paracetamol to alleviate suffering and prevent shock."
            },
            {
                id: 23,
                question: "According to the Rule of Nines for adults, what is the percentage for one complete arm?",
                options: ["4.5%", "9%", "18%", "1%"],
                correct: 1,
                rationale: "Arms are 9% each (4.5% for anterior and 4.5% for posterior)."
            },
            {
                id: 24,
                question: "Blisters act as a natural barrier against germs and should not be popped.",
                options: ["True", "False"],
                correct: 0,
                rationale: "True. Popping blisters can introduce infection; they act as a natural barrier."
            },
            {
                id: 25,
                question: "What is the correct action for a chemical burn?",
                options: ["Apply an alkaline neutralizer", "Remove contaminated clothing quickly", "Cover with a thick blanket", "Apply butter to soothe the skin"],
                correct: 1,
                rationale: "For chemical burns, quickly remove any contaminated clothing while protecting yourself from exposure."
            },
            {
                id: 26,
                question: "Which assessment step involves estimating the body surface area affected?",
                options: ["Determining the burn location", "Checking vital signs", "Rule of Nines calculation", "Identifying the burn source"],
                correct: 2,
                rationale: "Estimation of the percentage of body surface area affected is done using methods like the Rule of Nines."
            },
            {
                id: 27,
                question: "Why should you avoid cooling a severe burn for too long?",
                options: ["It may cause the skin to harden", "It prevents the medication from working", "It can lead to hypothermia", "It increases the risk of infection"],
                correct: 2,
                rationale: "For extensive burns, avoid over-cooling with water to prevent hypothermia."
            },
            {
                id: 28,
                question: "What is the innermost fatty layer of the skin called?",
                options: ["Epidermis", "Dermis", "Hypodermis", "Fascia"],
                correct: 2,
                rationale: "The Hypodermis is the innermost fatty layer that anchors the skin."
            },
            {
                id: 29,
                question: "Which type of burn is caused by exposure to X-rays?",
                options: ["Thermal Burns", "Chemical Burns", "Radiation Burns", "Electrical Burns"],
                correct: 2,
                rationale: "Radiation burns are caused by exposure to ionizing radiation like X-rays or non-ionizing radiation like sunlight."
            },
            {
                id: 30,
                question: "When should you stop adding cool water to a burn patient?",
                options: ["When the pain stops completely", "After exactly 5 minutes", "If signs of hypothermia appear", "Before emergency services arrive"],
                correct: 2,
                rationale: "Cooling should be stopped if there is a risk of hypothermia, especially in extensive burns."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
