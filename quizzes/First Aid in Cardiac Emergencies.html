<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">First Aid in Cardiac Emergencies</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                id: 1,
                question: "What is the primary characteristic of pain associated with a suspected aortic dissection?",
                options: ["Dull and aching pressure", "Sharp tearing or ripping sensation", "Burning indigestion", "Tight squeezing heaviness"],
                correct: 1,
                rationale: "Aortic dissection pain is classically described as sharp, tearing, or ripping, often felt in the back, flank, or arm, distinguishing it from the dull pressure of MI."
            },
            {
                id: 2,
                question: "Which patient position is most appropriate for a conscious client showing signs of heart failure to facilitate breathing?",
                options: ["Supine with legs elevated", "Sitting upright with legs dangling", "Left lateral recumbent", "Trendelenburg position"],
                correct: 1,
                rationale: "Sitting upright with legs dangling helps blood pool in the lower body, reducing pressure on the heart and lungs and making breathing easier."
            },
            {
                id: 3,
                question: "True or False: Classic angina pectoris is typically relieved by rest or nitroglycerin within a few minutes.",
                options: ["True", "False"],
                correct: 0,
                rationale: "Angina is characterized by pain that subsides after activity stops or upon taking nitroglycerin, usually lasting 2 to 15 minutes."
            },
            {
                id: 4,
                question: "What is the recommended aspirin dosage for a patient suspected of suffering from a coronary artery occlusion?",
                options: ["81 mg", "160 to 325 mg", "500 mg", "1000 mg"],
                correct: 1,
                rationale: "The protocol for suspected coronary artery occlusion is to administer 160-325 mg of aspirin to chew slowly to help thin the blood."
            },
            {
                id: 5,
                question: "Which finding is specifically associated with Pure Left Heart Failure?",
                options: ["Jugular venous distention", "Peripheral edema", "Inspiratory rales", "Clear breath sounds"],
                correct: 2,
                rationale: "Pure Left Heart Failure is characterized by inspiratory rales and a lack of peripheral edema or JVD, unlike Right Heart Failure."
            },
            {
                id: 6,
                question: "What is the maximum number of nitroglycerin tablets that can be administered to a patient with chest pain over a 10-minute period before calling it an emergency?",
                options: ["One", "Two", "Three", "Four"],
                correct: 2,
                rationale: "If pain is not relieved after three nitroglycerin tablets or sprays over a 10-minute period, it should be treated as an acute coronary syndrome emergency."
            },
            {
                id: 7,
                question: "Which group of patients is most likely to experience a 'silent MI' without typical chest discomfort?",
                options: ["Young athletes", "Diabetics", "Middle-aged men", "Adolescents"],
                correct: 1,
                rationale: "Diabetics, the elderly, and women are more prone to atypical presentations or 'silent MIs' where no chest discomfort is experienced."
            },
            {
                id: 8,
                question: "What is the priority intervention when a patient with angina becomes unconscious and stops breathing?",
                options: ["Administer another nitroglycerin", "Shake the patient vigorously", "Start Basic Life Support", "Check blood pressure"],
                correct: 2,
                rationale: "If the person becomes unconscious or stops breathing, the immediate priority is to call emergency services and begin CPR/BLS."
            },
            {
                id: 9,
                question: "True or False: Pericarditis pain typically worsens when the patient sits up and leans forward.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Pericarditis pain often improves when the patient sits up and leans forward; it typically worsens with deep breathing or lying flat."
            },
            {
                id: 10,
                question: "Which systolic blood pressure threshold is required before administering nitroglycerin?",
                options: ["Above 80 mmHg", "Above 90 mmHg", "Above 100 mmHg", "Above 110 mmHg"],
                correct: 1,
                rationale: "You must ensure the systolic blood pressure is above 90 mmHg and remains above it following each nitroglycerin administration."
            },
            {
                id: 11,
                question: "What is the first step in the Adult Cardiac Arrest Algorithm for a healthcare provider?",
                options: ["Check for a pulse", "Verify scene safety", "Begin chest compressions", "Give rescue breaths"],
                correct: 1,
                rationale: "The very first step in the algorithm is to verify that the scene is safe before approaching the victim."
            },
            {
                id: 12,
                question: "A difference of greater than 20 mmHg in systolic blood pressure between the upper arms suggests which condition?",
                options: ["Myocardial Infarction", "Aortic Dissection", "Pericarditis", "Stable Angina"],
                correct: 1,
                rationale: "A significant difference (>20 mmHg) in blood pressure between arms is a classic sign suspecting a possible aortic dissection."
            },
            {
                id: 13,
                question: "Which medication should be started first in aortic dissection management to avoid reflex tachycardia?",
                options: ["Nitrates", "Calcium channel blockers", "Beta blockers", "Sodium nitroprusside"],
                correct: 2,
                rationale: "Beta-blockers should be started before other antihypertensive drugs to avoid reflex tachycardia in aortic disease management."
            },
            {
                id: 14,
                question: "What is the correct compression-to-breath ratio for adult CPR?",
                options: ["15 compressions to 2 breaths", "30 compressions to 2 breaths", "10 compressions to 1 breath", "50 compressions to 2 breaths"],
                correct: 1,
                rationale: "The standard cycle for adult CPR is 30 compressions followed by 2 breaths."
            },
            {
                id: 15,
                question: "True or False: Acute Coronary Syndrome is caused by conditions where coronary arteries are narrowed or occluded.",
                options: ["True", "False"],
                correct: 0,
                rationale: "ACS results from conditions where coronary arteries are narrowed or occluded by plaque, clots, or spasms."
            },
            {
                id: 16,
                question: "Which symptom is most distinctive of unstable angina compared to stable angina?",
                options: ["Occurs only during exertion", "Relieved immediately by rest", "Occurs at rest or wakes patient at night", "Lasts less than 5 minutes"],
                correct: 2,
                rationale: "Unstable angina is characterized by pain that occurs at rest, is prolonged, or wakes the patient at night (nocturnal angina)."
            },
            {
                id: 17,
                question: "What is the target heart rate during transfer for a patient with a suspected aortic aneurysm?",
                options: ["Less than 60 beats per minute", "Between 80 and 100 beats per minute", "Greater than 100 beats per minute", "Whatever is normal for the patient"],
                correct: 0,
                rationale: "The target heart rate for aortic disease transfer is <60 beats/min to reduce stress on the vessel wall."
            },
            {
                id: 18,
                question: "Which term describes the condition where a patient wakes suddenly at night with shortness of breath?",
                options: ["Orthopnea", "Paroxysmal nocturnal dyspnea", "Tachypnea", "Apnea"],
                correct: 1,
                rationale: "Paroxysmal nocturnal dyspnea is the specific term for suddenly waking at night with dyspnea, a sign of heart failure."
            },
            {
                id: 19,
                question: "What is the maximum time limit for checking a pulse in a suspected cardiac arrest victim?",
                options: ["5 seconds", "10 seconds", "15 seconds", "20 seconds"],
                correct: 1,
                rationale: "The pulse check should be performed simultaneously with checking for breathing and should definitely be felt within 10 seconds."
            },
            {
                id: 20,
                question: "True or False: A patient with an aortic aneurysm should be encouraged to drink water to maintain blood volume.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Patients with suspected aortic aneurysm should not be given food or drink as surgery may be needed quickly and an empty stomach is safer."
            },
            {
                id: 21,
                question: "Which of the following is considered a 'typical' location for cardiac compromise discomfort?",
                options: ["Lower right abdomen", "Sternum radiating to the left arm", "Right calf muscle", "Lumbar spine only"],
                correct: 1,
                rationale: "Typical chest discomfort is localized to the sternum and may radiate to the jaw, arms, shoulders, or back."
            },
            {
                id: 22,
                question: "In the context of heart failure, what does the presence of JVD (Jugular Venous Distention) typically indicate?",
                options: ["Pure Left Heart Failure", "Right Heart Failure", "Mild Dehydration", "Aortic Dissection"],
                correct: 1,
                rationale: "JVD is a sign listed under findings for Right Heart Failure (or combined failure), whereas Pure Left Heart Failure shows no JVD."
            },
            {
                id: 23,
                question: "What is the rescue breathing rate for an adult victim with a pulse but who is not breathing normally?",
                options: ["1 breath every 3 seconds", "1 breath every 5 to 6 seconds", "2 breaths every 15 seconds", "Continuous breaths without pause"],
                correct: 1,
                rationale: "If the victim has a pulse but no normal breathing, provide rescue breathing at a rate of 1 breath every 5-6 seconds (10-12 breaths/min)."
            },
            {
                id: 24,
                question: "Which condition is characterized by a weakened section of the aortic wall ballooning outward?",
                options: ["Aortic Dissection", "Aortic Aneurysm", "Aortic Stenosis", "Aortic Regurgitation"],
                correct: 1,
                rationale: "An aortic aneurysm occurs when a weakened section of the aortic wall dilates or balloons outward due to pressure."
            },
            {
                id: 25,
                question: "True or False: Nitroglycerin usually provides complete relief for chest pain caused by an Acute Myocardial Infarction.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Chest discomfort from an AMI is typically only partially relieved or not relieved at all by nitroglycerin, unlike angina."
            },
            {
                id: 26,
                question: "What is the medical term for excessive sweating often seen in cardiac emergencies?",
                options: ["Dyspnea", "Diaphoresis", "Cyanosis", "Edema"],
                correct: 1,
                rationale: "Diaphoresis is the medical term for excessive sweating, a common symptom in ACS and heart failure."
            },
            {
                id: 27,
                question: "What is the primary reason for keeping a patient with heart failure calm and still?",
                options: ["To prevent them from falling", "To reduce the workload on the heart", "To administer IV fluids easier", "To stop them from talking"],
                correct: 1,
                rationale: "Anxiety increases heart rate and oxygen demand; keeping the patient calm and still reduces the strain on the failing heart."
            },
            {
                id: 28,
                question: "How long must chest pain usually persist after rest and medication to be considered a sign of a heart attack requiring emergency help?",
                options: ["1 minute", "5 minutes", "10 minutes", "30 minutes"],
                correct: 2,
                rationale: "If pain lasts more than 10 minutes after rest and medication, medical help should be called as it suggests a more serious condition like AMI."
            },
            {
                id: 29,
                question: "Which breath sound is most commonly associated with heart failure and fluid in the lungs?",
                options: ["Stridor", "Crackles", "Rhonchi", "Pleural rub"],
                correct: 1,
                rationale: "Crackles (and possibly wheezes) on auscultation are a sign of pulmonary edema associated with heart failure."
            },
            {
                id: 30,
                question: "What physical location is most common for aortic aneurysms?",
                options: ["Thoracic region", "Abdominal region", "Cerebral arteries", "Femoral arteries"],
                correct: 1,
                rationale: "The text states that aortic aneurysms occur most often in the abdominal region, whereas dissections are more common in the thorax."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
