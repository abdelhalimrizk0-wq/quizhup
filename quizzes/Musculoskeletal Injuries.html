<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Musculoskeletal Injuries and Fractures</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 40 QUESTIONS HERE) ---
        const rawQuizData = [
            { id: 1, question: "Which condition is classified as a delayed complication following a bone fracture?", options: ["Avascular bone necrosis", "Acute compartment syndrome", "Systemic fat embolism", "Venous thromboembolism"], correct: 0, rationale: "Avascular necrosis of bone is a delayed complication of fracture healing, whereas compartment syndrome, fat embolism, and VTE are early complications." },
            { id: 2, question: "A rolled newspaper can be properly utilized as a temporary support device during emergency situations.", options: ["True", "False"], correct: 0, rationale: "Splints can be made from everyday items like rolled newspapers, wood, or strong cartons to immobilize a fracture during an emergency." },
            { id: 3, question: "Which description best matches the characteristics of a hematoma?", options: ["Large localized blood formation", "Superficial skin tissue contusion", "Articular joint capsule sprain", "Contractile muscle fiber strain"], correct: 0, rationale: "A hematoma develops when bleeding is sufficient to cause a marked localized collection of blood, causing swelling and pain." },
            { id: 4, question: "Which physical manifestation represents a classical sign of compartment syndrome?", options: ["Severe limb pulselessness", "Localized tissue hyperemia", "Systemic rapid tachycardia", "Elevated systemic hypertension"], correct: 0, rationale: "Compartment syndrome includes the five Ps: pain, paralysis, paresthesia, pallor, and pulselessness." },
            { id: 5, question: "Strategies to relieve a patient's discomfort after a fracture generally include simple position changes and the administration of designated medications.", options: ["True", "False"], correct: 0, rationale: "Restlessness, anxiety, and discomfort are controlled with a variety of approaches, such as reassurance, position changes, and analgesics." },
            { id: 6, question: "What specific medical intervention helps prevent the occurrence of severe infections in patients with open fractures?", options: ["Administering tetanus prophylaxis", "Applying warm wet compresses", "Encouraging early ambulation", "Performing passive movements"], correct: 0, rationale: "Prevention of wound infection in open fractures is essential by administering tetanus prophylaxis, using aseptic techniques, and giving antibiotics." },
            { id: 7, question: "Which term accurately describes a localized physical injury involving a pulled muscle or tendon?", options: ["Muscle fiber strain", "Joint capsule sprain", "Soft tissue contusion", "Articular subluxation"], correct: 0, rationale: "A strain, or pulled muscle, is an injury to muscles and tendons caused by overuse, overstretching, or excessive stress." },
            { id: 8, question: "A physical fracture occurs when the skeletal bone is subjected to mechanical stress greater than it can absorb.", options: ["True", "False"], correct: 0, rationale: "Fractures occur when the bone is subjected to stress greater than it can absorb, breaking its continuity." },
            { id: 9, question: "Which term describes an injury where a vertebral body collapses due to underlying weakness or physical trauma?", options: ["Severe collapse of a vertebra", "Sudden twisting of a long bone", "Straight break across bone width", "Parallel break to long bone axis"], correct: 0, rationale: "A compression fracture or wedge fracture is a collapse of a vertebra typically due to osteoporosis or a fall from a height." },
            { id: 10, question: "How should proper stabilization devices be correctly positioned on an injured extremity during emergency care?", options: ["Directly above and below the fracture", "Only above the main fracture site", "Only below the main fracture site", "Exactly over the main fracture site"], correct: 0, rationale: "The splint should immobilize the joints above and the joints below the fracture to properly secure the affected area." },
            { id: 11, question: "A torn ligament completely retains its natural anatomical ability to stabilize the corresponding articular joint.", options: ["True", "False"], correct: 1, rationale: "A torn ligament loses its stabilizing ability, causing the joint to become tender and painful upon movement." },
            { id: 12, question: "What duration is strongly recommended for each application of a cold compress to prevent local tissue damage?", options: ["Applying for twenty continuous minutes", "Using hot water immediately beforehand", "Placing the ice directly over wounds", "Removing the elastic bandages frequently"], correct: 0, rationale: "Applying intermittent cold compresses for not more than 20 minutes at a time prevents skin and tissue damage from excessive cold." },
            { id: 13, question: "What specific mechanism causes the physical grating sensation known as crepitus during an extremity examination?", options: ["Friction from rubbing bone fragments", "Rapid accumulation of joint fluid", "Extensive tearing of soft tissues", "Massive collection of deep blood"], correct: 0, rationale: "Crepitus is a grating or crackling sensation caused by the rubbing of the bone fragments against each other." },
            { id: 14, question: "Visible skin discoloration always appears immediately following the occurrence of a severe traumatic bone fracture.", options: ["True", "False"], correct: 1, rationale: "Signs like localized edema and discoloration (ecchymosis) may not develop for several hours after the initial injury." },
            { id: 15, question: "Which underlying factor acts as the primary cause for the development of a pathological bone fracture?", options: ["Underlying severe bone disease", "Sudden twisting physical motion", "Direct heavy blunt force trauma", "Severe involuntary muscle pull"], correct: 0, rationale: "Pathological fractures are caused by bone diseases such as osteoporosis or bone cancer, rather than direct external trauma." },
            { id: 16, question: "What is the intended primary therapeutic function of applying an elastic compression bandage to an injured joint?", options: ["Controls local bleeding and edema", "Provides permanent rigid support", "Enhances deep soft tissue healing", "Restores normal joint alignment"], correct: 0, rationale: "An elastic compression bandage controls bleeding, reduces edema, and provides support for the injured tissues." },
            { id: 17, question: "Which physiological mechanism is primarily responsible for the actual measurable shortening of an extremity in long bone fractures?", options: ["Severe sustained muscle contractions", "Total peripheral ligament ruptures", "Massive surrounding tissue swelling", "Extensive subcutaneous fluid leakage"], correct: 0, rationale: "In fractures of long bones, there is actual shortening of the extremity because of the contraction of the surrounding muscles." },
            { id: 18, question: "An open bone fracture generally carries a significantly higher risk of bacterial infection compared to a closed fracture.", options: ["True", "False"], correct: 0, rationale: "Open fractures are more dangerous because the open wound significantly increases the risk of bleeding, infection, and deformity." },
            { id: 19, question: "When is the most appropriate timeframe to utilize intermittent cold applications for a fresh musculoskeletal injury?", options: ["During the first two days", "After the third full day", "Continuously for one week", "Only during the nighttime"], correct: 0, rationale: "Cold compresses are applied intermittently during the first 24 to 48 hours after an injury to produce vasoconstriction." },
            { id: 20, question: "Which critical action must always be prioritized and established first during emergency fracture management?", options: ["Ensure a stable patent airway", "Obtain central intravenous access", "Administer potent pain relievers", "Apply dry sterile wound dressings"], correct: 0, rationale: "During emergency management, establishing and maintaining a patent airway is a critical priority before addressing the fracture." },
            { id: 21, question: "Which specific category of physical exercise is highly encouraged to minimize disuse atrophy during limb immobilization?", options: ["Structured isometric exercises", "Progressive isotonic exercises", "Cardiovascular aerobic exercises", "High impact plyometric exercises"], correct: 0, rationale: "Isometric and muscle-setting exercises are encouraged to minimize disuse atrophy and promote circulation while immobilized." },
            { id: 22, question: "Therapeutic isometric exercises should only be strictly performed on the unaffected body parts to prevent further damage.", options: ["True", "False"], correct: 1, rationale: "Isometric and muscle-setting exercises are encouraged for both the affected and unaffected parts to prevent disuse atrophy." },
            { id: 23, question: "Which specific item of clothing should optimally be removed first when managing a patient with a suspected fracture?", options: ["The uninjured healthy extremity", "The severely injured extremity", "Both lower limbs simultaneously", "Both upper limbs simultaneously"], correct: 0, rationale: "You should carefully undress the unaffected limb first, then proceed to undress the affected limb if necessary." },
            { id: 24, question: "Which distinct clinical sign serves as a primary indicator of a compromised neurovascular status in a fractured limb?", options: ["Unexplained distal paresthesia", "Systemic persistent hyperthermia", "Extensive local skin erythema", "Uncontrolled systemic tachycardia"], correct: 0, rationale: "Paresthesia (abnormal sensation) is part of the '5 Ps' and directly indicates neurovascular compromise or compartment syndrome." },
            { id: 25, question: "Which term describes the definitive hospital procedure utilized to restore fracture fragments into their correct anatomical alignment?", options: ["Anatomic fracture reduction", "Complete limb immobilization", "Continuous external compression", "Affected extremity elevation"], correct: 0, rationale: "Reduction is the restoration of the fracture fragments to their proper anatomic alignment." },
            { id: 26, question: "The vast majority of soft tissue contusions completely resolve naturally without intervention within one to two weeks.", options: ["True", "False"], correct: 0, rationale: "Most contusions resolve naturally in 1 to 2 weeks as the body absorbs the extravasated blood." },
            { id: 27, question: "Which descriptive phrase accurately defines the clinical presentation of a simple closed bone fracture?", options: ["Broken bone without skin injury", "Broken bone with an open wound", "Bone fragmented into many pieces", "Bone collapsed from osteoporosis"], correct: 0, rationale: "A closed fracture, or simple fracture, is defined as a broken bone without any associated skin injury." },
            { id: 28, question: "Which distinct classification of fracture is most frequently encountered in pediatric patients due to their pliable bones?", options: ["Pediatric greenstick fracture", "Severe impacted fracture", "Extensive comminuted fracture", "Forceful avulsion fracture"], correct: 0, rationale: "A greenstick fracture is an incomplete fracture that usually occurs in children whose bones are still pliable and soft." },
            { id: 29, question: "Which term accurately describes a complicated fracture where the bone structure is splintered into more than two pieces?", options: ["Multifragment comminuted fracture", "Complete transverse fracture", "Longitudinal linear fracture", "Twisted spiral bone fracture"], correct: 0, rationale: "A comminuted fracture is a break where the bone is fragmented into more than two distinct bone fragments." },
            { id: 30, question: "A systemic fat embolism syndrome usually occurs exclusively following the fracture of very small bones in the hand.", options: ["True", "False"], correct: 1, rationale: "Fat embolism typically occurs following the fracture of long bones or pelvic bones, where fat particles escape the bone marrow." },
            { id: 31, question: "Which specific medical term describes the clinical condition involving a partial dislocation of articulating joint surfaces?", options: ["Partial articular subluxation", "Complete joint dislocation", "Muscle fiber severe strain", "Soft tissue deep contusion"], correct: 0, rationale: "Subluxation is defined precisely as a partial dislocation of the articulating surfaces within a joint." },
            { id: 32, question: "Which classification of injury directly involves the structural supporting fibers that surround and stabilize a joint?", options: ["Supporting joint ligament sprain", "Active muscle body strain", "Superficial soft tissue contusion", "Deep localized blood hematoma"], correct: 0, rationale: "A sprain is an injury to the ligaments and supporting muscle fibers that surround and stabilize a joint." },
            { id: 33, question: "Which specific type of bone fracture occurs when the separated broken ends are forcefully driven directly into each other?", options: ["Jammed impacted bone fracture", "Multifragment comminuted fracture", "Tendon pulled avulsion fracture", "Vertebral body compression fracture"], correct: 0, rationale: "An impacted fracture occurs when the broken ends of the bone are driven into each other and jammed together." },
            { id: 34, question: "Which statement accurately describes the characteristics of an open reduction procedure performed in a hospital setting?", options: ["Surgical approach to realign fragments", "Manual manipulation through intact skin", "Continuous traction without any surgery", "External casting without using anesthesia"], correct: 0, rationale: "An open reduction involves a surgical approach to reduce fracture fragments, often utilizing internal fixation devices." },
            { id: 35, question: "Which distinct fracture category is characterized by a break cutting across the bone at perfectly right angles?", options: ["Right angle transverse fracture", "Diagonal oblique bone fracture", "Longitudinal linear bone fracture", "Twisting spiral bone fracture"], correct: 0, rationale: "A transverse fracture cuts across the bone at right angles relative to its long axis." },
            { id: 36, question: "Surgically implanted internal fixation devices essentially function as internal splints to firmly immobilize a treated fracture.", options: ["True", "False"], correct: 0, rationale: "Metal implants used for internal fixation serve precisely as internal splints to immobilize the fracture during healing." },
            { id: 37, question: "Which unique type of fracture describes a situation where a bone fragment is completely pulled away by soft tissue tension?", options: ["Tendon pulled avulsion fracture", "Vertebral body wedge fracture", "Twisting diagonal spiral fracture", "Longitudinal straight linear fracture"], correct: 0, rationale: "An avulsion fracture occurs when a fragment of bone is separated from the main mass, usually by the forceful pulling of muscles and tendons." },
            { id: 38, question: "Which major systemic complication is characterized by microscopic fat particles occluding essential pulmonary and cerebral blood vessels?", options: ["Systemic fat embolism syndrome", "Acute local compartment syndrome", "Deep venous thromboembolism", "Progressive avascular bone necrosis"], correct: 0, rationale: "Fat embolism occurs when fat particles from marrow diffuse into the vascular compartment, occluding vessels to the lungs and brain." },
            { id: 39, question: "Which standard diagnostic modality is most commonly utilized to definitively confirm the presence of an articular joint dislocation?", options: ["Standard diagnostic radiography", "Systemic fiberoptic endoscopy", "Continuous electrocardiogram", "Comprehensive pulmonary spirometry"], correct: 0, rationale: "The signs and symptoms of a traumatic dislocation are definitively confirmed by performing X-rays (radiography)." },
            { id: 40, question: "When is the scientifically appropriate time to initiate warm applications to effectively relieve lingering muscle spasms after an injury?", options: ["After twenty four hours", "Immediately after the injury", "Following one entire week", "Within the initial hour"], correct: 0, rationale: "Intermittent warm applications are utilized strictly after 24 hours to relieve muscle spasms and promote vasodilation and repair." }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
