<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Renal Failure Quiz</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 40 QUESTIONS HERE) ---
        const rawQuizData = [
            { id: 1, question: "Chronic kidney disease requires kidney damage lasting for at least three months.", options: ["True", "False"], correct: 0, rationale: "Chronic Kidney Disease is an umbrella term describing kidney damage or a decrease in the Glomerular Filtration Rate lasting for three or more months." },
            { id: 2, question: "Which condition is categorized as a prerenal cause of acute renal failure?", options: ["Acute tubular necrosis", "Prostatic hypertrophy", "Myocardial infarction", "Ureteral calculi"], correct: 2, rationale: "Prerenal disorders disrupt renal blood flow. A condition that decreases cardiac output, such as a myocardial infarction, is considered a prerenal cause." },
            { id: 3, question: "At which glomerular filtration rate does a patient reach stage five chronic renal failure?", options: ["Less than fifteen milliliters per minute", "Between fifteen and twenty nine milliliters per minute", "Between thirty and fifty nine milliliters per minute", "Greater than ninety milliliters per minute"], correct: 0, rationale: "Stage 5 is kidney failure requiring dialysis or transplantation, marked by a Glomerular Filtration Rate of less than 15 milliliters per minute." },
            { id: 4, question: "How long does an arteriovenous fistula typically require to mature before it can be used for hemodialysis?", options: ["One to four months", "Two to three weeks", "Five to seven days", "Six to eight months"], correct: 0, rationale: "Arteriovenous fistulas require from one to four months to mature before being used for hemodialysis access." },
            { id: 5, question: "Which dietary modification is most appropriate for a patient with chronic renal failure who is not on dialysis?", options: ["Unrestricted fluid intake to flush the kidneys", "High intake of low biological value protein", "Fifty grams of high biological value protein daily", "Increased dietary potassium and sodium consumption"], correct: 2, rationale: "Strict adherence to a low protein diet of about 50 grams daily of high biological value protein can delay progression to end stage renal disease." },
            { id: 6, question: "The oliguric phase of acute renal failure is characterized by a daily urine output exceeding four liters.", options: ["True", "False"], correct: 1, rationale: "The oliguric phase is defined by a significantly decreased urine output of less than 400 milliliters per 24 hours." },
            { id: 7, question: "What is the primary underlying mechanism that causes disequilibrium syndrome during hemodialysis?", options: ["Rapid reduction of blood solute concentrations", "Excessive ultrafiltration causing hypovolemia", "Accumulation of uremic toxins in the nerves", "Rapid infusion of hypertonic dialysate"], correct: 0, rationale: "Disequilibrium syndrome is a neurologic condition caused by cerebral edema, occurring when solute concentrations in the blood are rapidly lowered during dialysis." },
            { id: 8, question: "Which phase of a peritoneal dialysis exchange involves the time fluid remains in the peritoneal cavity?", options: ["Fill phase", "Dwell phase", "Drain phase", "Flush phase"], correct: 1, rationale: "The dwell phase is the specific period during which the dialysate fluid remains inside the peritoneal cavity." },
            { id: 9, question: "Which medication is specifically administered to shift potassium back into the cells during hyperkalemia?", options: ["Sodium polystyrene sulfonate", "Intravenous sodium bicarbonate", "Aluminum hydroxide gel", "Intravenous dextrose and insulin"], correct: 3, rationale: "If the patient experiences electrocardiogram changes from hyperkalemia, intravenous dextrose and insulin may be given to shift potassium back into the cells." },
            { id: 10, question: "Patients with chronic renal failure typically develop a normochromic normocytic anemia.", options: ["True", "False"], correct: 0, rationale: "Hematologic effects of chronic renal failure include normochromic normocytic anemia, which causes fatigue, weakness, and pallor." },
            { id: 11, question: "What respiratory pattern is frequently observed as a compensatory mechanism for metabolic acidosis in renal failure?", options: ["Cheyne stokes respirations", "Kussmaul respirations", "Biot breathing patterns", "Paradoxical chest movements"], correct: 1, rationale: "Respiratory effects of chronic renal failure include Kussmaul respirations, which develop as a compensatory response to severe metabolic acidosis." },
            { id: 12, question: "Which symptom strongly indicates the development of peritonitis in a patient undergoing peritoneal dialysis?", options: ["Clear drainage fluid", "Severe abdominal rigidity", "Decreased blood pressure", "Left shoulder pain"], correct: 1, rationale: "Peritonitis is a major complication of peritoneal dialysis characterized by fever, nausea, vomiting, severe abdominal pain, rigidity, and tenderness." },
            { id: 13, question: "When administering aluminum hydroxide gel to a patient with renal failure what is the primary therapeutic goal?", options: ["To neutralize gastric acid production", "To bind dietary phosphorus in the gut", "To supplement systemic calcium levels", "To facilitate intracellular potassium shifts"], correct: 1, rationale: "Disturbances in calcium metabolism are managed with phosphate binders such as aluminum hydroxide gels given at mealtimes to bind dietary phosphorus." },
            { id: 14, question: "Hemodialysis relies on the principle of osmosis to move urea and creatinine from the blood into the dialysate.", options: ["True", "False"], correct: 1, rationale: "Diffusion is the process responsible for moving urea, creatinine, and uric acid from the patient's blood into the dialysate, whereas osmosis involves the movement of water." },
            { id: 15, question: "What is the recommended bathing practice to manage pruritus in patients with chronic renal failure?", options: ["Vigorous scrubbing with antibacterial soap", "Soaking in hot water for one hour", "Using lukewarm water and glycerin soap", "Applying alcohol based lotions daily"], correct: 2, rationale: "Patients should limit bathing to less than half an hour using lukewarm water and glycerin based soap to maintain skin integrity and prevent excessive scratching." },
            { id: 16, question: "During the diuretic phase of acute renal failure which laboratory trend is typically observed despite increased urine output?", options: ["Rapid normalization of serum creatinine", "Continuous elevation of blood urea nitrogen", "Drastic reduction in serum potassium", "Immediate restoration of filtration rate"], correct: 1, rationale: "During the diuretic phase, despite increased water content in urine, blood urea nitrogen and creatinine levels remain elevated in the blood." },
            { id: 17, question: "Which vascular access method utilizes a synthetic tube to connect an artery and a vein?", options: ["Arteriovenous fistula", "Tunneled central catheter", "Arteriovenous graft", "Subclavian vein catheter"], correct: 2, rationale: "An arteriovenous graft is a type of vascular access that uses a tube of synthetic material to connect a vein and an artery." },
            { id: 18, question: "Continuous cyclic peritoneal dialysis is performed primarily while the patient is sleeping.", options: ["True", "False"], correct: 0, rationale: "In Continuous Cyclic Peritoneal Dialysis, a machine automatically fills and drains dialysate from the abdomen while the person sleeps." },
            { id: 19, question: "Which condition represents an intrarenal cause of acute renal failure?", options: ["Severe systemic hemorrhage", "Bilateral ureteral stricture", "Acute tubular necrosis", "Benign prostatic hypertrophy"], correct: 2, rationale: "Acute tubular necrosis is an intrarenal condition that directly destroys nephrons inside the kidney itself." },
            { id: 20, question: "Why might a patient receiving hemodialysis be prescribed calcium carbonate instead of an aluminum based phosphate binder?", options: ["To prevent the exacerbation of bone disease", "To increase the removal of excess fluid", "To stimulate bone marrow red blood cells", "To rapidly lower the plasma osmolality"], correct: 0, rationale: "A hemodialysis patient may receive calcium carbonate instead of an aluminum binder, which can exacerbate bone disease and promote faulty mineralization." },
            { id: 21, question: "Acute renal failure is a progressive and irreversible deterioration in kidney function.", options: ["True", "False"], correct: 1, rationale: "Chronic renal failure is progressive and irreversible. Acute renal failure is characterized by a sudden and rapid decrease in function that is potentially reversible." },
            { id: 22, question: "What should the nurse do if a thrill is absent when assessing an arteriovenous fistula?", options: ["Flush the fistula with sterile saline", "Administer a local anticoagulant", "Postpone use and report the finding", "Apply a warm compress to the arm"], correct: 2, rationale: "If the nurse cannot palpate a thrill or auscultate a bruit, they must postpone further use of the access and report the findings immediately." },
            { id: 23, question: "Which skin manifestation is characterized by white dust like deposits on the face and upper trunk?", options: ["Petechial hemorrhages", "Uremic frost", "Erythematous rash", "Pitting edema"], correct: 1, rationale: "Uremic frost appears as white, dust like deposits of urea and phosphate crystals on the face, nose, forehead, and upper trunk." },
            { id: 24, question: "A patient with chronic renal failure and decreased urine output should have unlimited fluid intake to stimulate kidney function.", options: ["True", "False"], correct: 1, rationale: "If urine output is decreased and fluid overload becomes a problem, fluid intake typically is restricted to the previous day's urine output plus 500 milliliters." },
            { id: 25, question: "What physiological principle is defined as the removal of water from an area of higher pressure to an area of lower pressure during dialysis?", options: ["Simple diffusion", "Active transport", "Ultrafiltration", "Facilitated osmosis"], correct: 2, rationale: "Ultrafiltration uses negative pressure to facilitate the removal of water, moving it from higher pressure to lower pressure." },
            { id: 26, question: "Which neurological condition involves numbness tingling and extreme tenderness of the soles of the feet?", options: ["Uremic encephalopathy", "Burning feet syndrome", "Disequilibrium syndrome", "Asterexis tremor"], correct: 1, rationale: "Peripheral nervous system effects of chronic renal failure include burning feet syndrome, characterized by extreme tenderness and redness of the soles." },
            { id: 27, question: "Erythropoietin is administered to patients with renal failure to stimulate bone marrow production of red blood cells.", options: ["True", "False"], correct: 0, rationale: "Instead of administering blood transfusions to correct chronic anemia, erythropoietin is given to stimulate the bone marrow to produce red blood cells." },
            { id: 28, question: "If a peritoneal dialysis infusion is draining slowly which initial maneuver should the nurse ask the patient to perform?", options: ["Perform deep breathing exercises", "Drink a large glass of water", "Move from side to side", "Lie completely flat on the back"], correct: 2, rationale: "If the peritoneal dialysis infusion is slow, the nurse should first ask the client to move from side to side before seeking physician intervention." },
            { id: 29, question: "Which vitamin supplements are commonly required for patients on restrictive renal diets or undergoing dialysis?", options: ["Vitamins A and D", "Vitamin K and Calcium", "Folic acid and Vitamin C", "Vitamin E and Magnesium"], correct: 2, rationale: "Supplements of B complex vitamins, folic acid, and vitamin C may be needed to compensate for deficiencies resulting from a restrictive diet or dialysis." },
            { id: 30, question: "The initiation phase of acute renal failure is characterized by which cellular event?", options: ["Restoration of normal tubular function", "Death of cells in the collecting tubules", "Massive excretion of protein wastes", "Increased blood flow to the nephrons"], correct: 1, rationale: "The initiation phase begins with the contributing event and progresses to acute tubular necrosis, which refers to the death of cells in the collecting tubules." },
            { id: 31, question: "Blood pressure measurements can be safely taken on the arm that has an arteriovenous fistula.", options: ["True", "False"], correct: 1, rationale: "Patients must be taught not to permit venipunctures, injections, or blood pressure measurements on the arm with the vascular access." },
            { id: 32, question: "What is the primary purpose of administering sodium polystyrene sulfonate to a patient with renal failure?", options: ["To remove excess potassium from the body", "To replace lost serum sodium levels", "To correct systemic metabolic acidosis", "To increase the glomerular filtration rate"], correct: 0, rationale: "Sodium polystyrene sulfonate is an ion exchange resin prescribed for oral or rectal administration to remove excess potassium when hyperkalemia occurs." },
            { id: 33, question: "What is a major disadvantage of using a tunneled central venous catheter for immediate dialysis access?", options: ["It requires several months to mature", "It has a high incidence of infection", "It cannot be used for diabetic patients", "It prevents continuous replacement therapy"], correct: 1, rationale: "While tunneled central venous catheters offer immediate use, they carry a high incidence of infection and risks like subclavian vein stenosis." },
            { id: 34, question: "Once long term hemodialysis begins a patient is allowed a more liberal protein intake compared to conservative management.", options: ["True", "False"], correct: 0, rationale: "Once long term dialysis begins, a more liberal protein intake is allowed because the dialysis machine can filter out the resulting nitrogenous waste products." },
            { id: 35, question: "Which component is added to the dialysate bath to help maintain the body buffer system and correct acid base imbalances?", options: ["Calcium carbonate", "Potassium chloride", "Acetate", "Magnesium sulfate"], correct: 2, rationale: "The body's buffer system is maintained by adding acetate to the dialysate, which diffuses into the blood and is metabolized to form bicarbonate." },
            { id: 36, question: "Patients with chronic renal failure often experience which gastrointestinal symptom due to the accumulation of nitrogenous wastes?", options: ["Increased appetite for high protein foods", "A metallic or ammonia like taste", "Decreased gastric acid production", "Severe continuous abdominal cramping"], correct: 1, rationale: "Gastrointestinal effects of chronic renal failure include a metallic or ammonia like taste in the mouth along with stomatitis and uremic breath odor." },
            { id: 37, question: "Continuous renal replacement therapy is most appropriate for which type of patient?", options: ["An active patient requiring nocturnal treatment", "A critically ill patient with unstable hemodynamics", "A stable patient awaiting kidney transplantation", "A patient with chronic irreversible kidney disease"], correct: 1, rationale: "Continuous renal replacement therapy is used for critically ill patients with acute renal failure who cannot tolerate regular hemodialysis due to hemodynamic instability." },
            { id: 38, question: "Which condition is classified as a postrenal cause of acute renal failure?", options: ["Bilateral renal vein thrombosis", "Severe systemic hypovolemia", "Acute tubular necrosis", "Acute myocardial infarction"], correct: 0, rationale: "Postrenal disorders are obstructive problems below the kidneys, such as bilateral renal vein thrombosis, ureteral calculi, or tumors." },
            { id: 39, question: "How soon can an arteriovenous graft typically be used after its surgical insertion?", options: ["Fourteen days", "Twenty four hours", "Two months", "Six months"], correct: 0, rationale: "An arteriovenous graft can typically be used fourteen days after its surgical insertion, making it faster to use than a fistula." },
            { id: 40, question: "Which diagnostic finding is most consistent with the presence of chronic renal failure?", options: ["Decreased blood urea nitrogen levels", "Elevated serum calcium levels", "Decreased urine specific gravity", "Increased blood acidity levels"], correct: 2, rationale: "Urinalysis in chronic renal failure reveals a decreased specific gravity. Laboratory blood tests will show elevated blood urea nitrogen and decreased calcium levels." }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
