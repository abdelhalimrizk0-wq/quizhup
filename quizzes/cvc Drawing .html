<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Drawing Blood Sample from CVC</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-check text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- GENERATE 20 QUESTIONS HERE BASED ON INPUT MATERIAL ---
        const quizData = [
            {
                id: 1,
                question: "What is the primary rationale for considering alternate routes like venipuncture before using a CVC for blood sampling?",
                options: ["To minimize the risk of bloodstream infections", "To ensure a larger volume of blood is obtained", "To reduce the time required for the procedure", "To prevent patient anxiety during the procedure"],
                correct: 0,
                rationale: "Alternate routes of blood withdrawal should be considered first to minimize the risk of central venous catheter-related bloodstream infections."
            },
            {
                id: 2,
                question: "Which specific patient condition is listed as an indication for drawing blood samples from a CVC?",
                options: ["Patient requesting painless procedures", "Patient with hardening of veins from chemotherapy", "Patient requiring daily arterial blood gases", "Patient with a fear of standard needles"],
                correct: 1,
                rationale: "Indications include patients receiving multiple doses of chemotherapy who may have hardening of the veins to use for sampling."
            },
            {
                id: 3,
                question: "Why is the use of a needleless system recommended for accessing CVC ports?",
                options: ["It is cheaper than standard needle systems", "It reduces needle-stick injuries and infection risk", "It allows for faster blood withdrawal rates", "It eliminates the need for antiseptic cleaning"],
                correct: 1,
                rationale: "Needleless systems reduce needle-stick injuries and the resultant risk for transmission of blood-borne infection to healthcare workers."
            },
            {
                id: 4,
                question: "During the assessment phase, why does the nurse check previous lab results?",
                options: ["To determine the patient's blood type", "To provide baseline data for comparison", "To calculate the total blood volume needed", "To identify the patient's medication allergies"],
                correct: 1,
                rationale: "Checking previous lab results provides baseline data for comparison."
            },
            {
                id: 5,
                question: "What critical assessment regarding the CVC must be performed to ensure sampling is possible?",
                options: ["Check the CVC insertion date", "Check CVC patency for clots", "Check the length of the external catheter", "Check the manufacturer of the catheter"],
                correct: 1,
                rationale: "The nurse must check CVC patency. If the CVC is clotted, blood sampling cannot be performed."
            },
            {
                id: 6,
                question: "What is the correct action regarding intravenous medications before blood sampling?",
                options: ["Stop all medications for 1 hour", "Stop medications temporarily unless they affect hemodynamics", "Increase the flow rate to clear the line", "Continue all medications during sampling"],
                correct: 1,
                rationale: "Intravenous solutions and medications need to be stopped temporarily, but do not stop medications that affect hemodynamics."
            },
            {
                id: 7,
                question: "Which antiseptic solution is explicitly recommended for cleansing the access site?",
                options: ["10% Povidone-iodine solution", "2% Chlorhexidine solution", "Sterile normal saline solution", "Hydrogen peroxide solution"],
                correct: 1,
                rationale: "The equipment list specifies Antiseptic solution (e.g., 2% chlorhexidine)."
            },
            {
                id: 8,
                question: "What is the primary purpose of explaining the procedure to the patient and positioning them properly?",
                options: ["To decrease anxiety and gain cooperation", "To distract the patient from pain", "To satisfy legal consent requirements", "To speed up the collection process"],
                correct: 0,
                rationale: "Explaining the procedure and proper positioning helps to decrease anxiety and gain cooperation."
            },
            {
                id: 9,
                question: "Which PPE is required for the nurse to decrease the risk of infection transmission?",
                options: ["Sterile gloves and gown", "Non-sterile gloves and goggles or mask", "Surgical cap and shoe covers", "Sterile gloves and N95 respirator"],
                correct: 1,
                rationale: "Required equipment includes non-sterile gloves, goggles, or fluid shield face mask."
            },
            {
                id: 10,
                question: "What specific parts of the access site must be cleansed to prevent microorganism introduction?",
                options: ["The skin around the insertion site", "The injection cap and catheter hub", "The entire length of the catheter", "The syringe tip and plunger"],
                correct: 1,
                rationale: "The nurse must cleanse the access site 'injection cap, catheter hub' to prevent introduction of microorganisms."
            },
            {
                id: 11,
                question: "What action is taken immediately after attaching the first 10cm syringe to the CVC lumen?",
                options: ["Aspirate the sample immediately", "Release the clamp", "Flush with normal saline", "Inject heparin solution"],
                correct: 1,
                rationale: "Step 4 is attaching the syringe, and Step 5 is 'Release the clamp'."
            },
            {
                id: 12,
                question: "How much blood is initially aspirated in the first syringe before collecting the sample?",
                options: ["2 mL", "5 mL", "10 mL", "20 mL"],
                correct: 2,
                rationale: "The procedure states to aspirate 10cm (10 mL) of blood."
            },
            {
                id: 13,
                question: "Why must the CVC be clamped when changing syringes?",
                options: ["To prevent blood spillage", "To prevent air embolism", "To measure blood pressure", "To stabilize the catheter"],
                correct: 1,
                rationale: "Clamping the CVC when changing syringes is done to prevent air embolism."
            },
            {
                id: 14,
                question: "What determines the size of the empty syringe attached for the actual sample collection?",
                options: ["The size of the patient's veins", "The volume of blood to be obtained", "The policy of the hospital", "The preference of the nurse"],
                correct: 1,
                rationale: "Attach the empty syringe 'size according to volume of blood to be obtained'."
            },
            {
                id: 15,
                question: "What is the purpose of flushing the lumen with sterile saline after filling the blood tubes?",
                options: ["To dilute the remaining blood", "To maintain the patency of CVC", "To administer medication", "To prevent pain at the site"],
                correct: 1,
                rationale: "Attaching a syringe filled with sterile saline and flushing is done to maintain the patency of CVC."
            },
            {
                id: 16,
                question: "When should the I.V. infusion be reconnected?",
                options: ["Immediately after aspirating blood", "After covering the three-way port", "Before flushing with saline", "After the lab results return"],
                correct: 1,
                rationale: "The procedure lists reconnecting the I.V. infusion (Step 16) after covering the three-way (Step 15)."
            },
            {
                id: 17,
                question: "What information must be recorded in the documentation regarding the samples?",
                options: ["The color of the blood drawn", "The list of lab samples sent to lab", "The brand of syringe used", "The total cost of the procedure"],
                correct: 1,
                rationale: "Documentation must include the list of lab samples that have been sent to the lab."
            },
            {
                id: 18,
                question: "Which of the following is NOT listed as a direct indication for CVC sampling?",
                options: ["Failure of alternate route", "Frequent venipuncture", "Hardening of veins from chemotherapy", "Patient preference for CVC use"],
                correct: 3,
                rationale: "Indications listed are failure of alternate route, frequent venipuncture, and chemotherapy patients. Patient preference is not listed."
            },
            {
                id: 19,
                question: "Why is it important to fill out requisition forms accurately?",
                options: ["To ensure correct patient data", "To billing purposes only", "To check nurse handwriting", "To track supply usage"],
                correct: 0,
                rationale: "Filling out requisition forms and sending them to the lab is done to ensure the correct patient data."
            },
            {
                id: 20,
                question: "What is the first step in the 'Post care' phase regarding the patient?",
                options: ["Check vital signs", "Reassure the patient", "Administer pain medication", "Change the dressing"],
                correct: 1,
                rationale: "Under Post care for the patient, the first action listed is 'Reassure the patient'."
            }
        ];

        const container = document.getElementById('quiz-container');
        let score = 0;
        let answeredCount = 0;

        function shuffleOptions() {
            quizData.forEach(q => {
                // Keep track of the correct answer string
                const correctAnswer = q.options[q.correct];
                
                // Shuffle options array using Fisher-Yates algorithm
                for (let i = q.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
                }
                
                // Update correct index to match new position
                q.correct = q.options.indexOf(correctAnswer);
            });
        }

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${index}, ${i})" 
                                class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white">
                                <span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-blue-400">
                                    <div class="w-2.5 h-2.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></div>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <div class="flex items-start gap-3">
                            <i class="fas fa-info-circle text-blue-500 mt-1"></i>
                            <div>
                                <p class="font-bold text-blue-900 text-sm mb-1">Rationale</p>
                                <p class="text-blue-800 text-sm leading-relaxed">${q.rationale}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const question = quizData[qIndex];
            const feedbackEl = document.getElementById(`feedback-${qIndex}`);
            const buttons = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (feedbackEl.classList.contains('block')) return; 
            feedbackEl.classList.remove('hidden-content');
            feedbackEl.classList.add('block');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-blue-50', 'hover:border-blue-300', 'bg-white');
                const iconContainer = btn.lastElementChild;
                if (i === question.correct) {
                    btn.classList.add('correct-answer');
                    iconContainer.innerHTML = '<i class="fas fa-check text-green-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else if (i === optIndex) {
                    btn.classList.add('wrong-answer');
                    iconContainer.innerHTML = '<i class="fas fa-times text-red-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else {
                    btn.classList.add('opacity-50');
                }
            });
            answeredCount++;
            if (optIndex === question.correct) score++;
            if (answeredCount === quizData.length) {
                const resultDiv = document.getElementById('result-summary');
                resultDiv.classList.remove('hidden-content');
                document.getElementById('score-display').textContent = score;
                document.getElementById('total-display').innerText = `/ ${quizData.length}`;
                const messageEl = document.getElementById('score-message');
                const percentage = (score / quizData.length) * 100;
                if (percentage === 100) messageEl.textContent = "Perfect Score!";
                else if (percentage >= 75) messageEl.textContent = "Great Job!";
                else if (percentage >= 50) messageEl.textContent = "Good effort.";
                else messageEl.textContent = "Keep studying!";
                setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 500);
            }
        };

        // Initialize
        shuffleOptions();
        renderQuiz();
    </script>
</body>
</html>
