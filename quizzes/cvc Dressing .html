<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Dressing on Central Venous Catheter</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-check text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- GENERATE 40 QUESTIONS HERE BASED ON INPUT MATERIAL ---
        const quizData = [
            {
                id: 1,
                question: "A nurse is reviewing the hospital policy regarding Central Venous Catheter (CVC) care. According to standard guidelines, what is the minimum frequency for changing a transparent dressing?",
                options: ["At least every 2 days", "At least every 24 hours", "At least every 7 days", "At least every 4 days"],
                correct: 2, 
                rationale: "The text explicitly states: 'Transparent dressing should be changed at least every 7 days'."
            },
            {
                id: 2,
                question: "A patient has a gauze dressing over their CVC insertion site. How often must this specific type of dressing be changed according to policy?",
                options: ["Every 7 days", "Every 2 days", "Every 5 days", "Every 12 hours"],
                correct: 1, 
                rationale: "According to the document: 'Gauze dressing should be changed at least every 2 days according to hospital policy'."
            },
            {
                id: 3,
                question: "During a CVC dressing change procedure, the nurse instructs the patient to turn their head away from the catheter insertion site. What is the primary rationale for this action?",
                options: ["To assess neck mobility", "To decrease the risk for contamination", "To facilitate easier breathing", "To improve visualization of the site"],
                correct: 1, 
                rationale: "The rationale provided in the procedure section for turning the head away is 'To decrease the risk for contamination'."
            },
            {
                id: 4,
                question: "A nurse assesses a CVC site and notes active oozing. Which type of dressing is most appropriate to apply in this situation?",
                options: ["Occlusive dressing", "Transparent film only", "Non-sterile bandage", "Hydrocolloid patch"],
                correct: 0, 
                rationale: "The procedure states: 'except in cases of oozing apply occlusive dressing' (implies gauze/absorbent under occlusion). Gauze absorbs moisture."
            },
            {
                id: 5,
                question: "The nurse is preparing to cleanse the CVC exit site. Which antiseptic solution is the recommended agent for this procedure?",
                options: ["10% Povidone-iodine", "70% Isopropyl alcohol", "2% Chlorhexidine based", "Normal saline solution"],
                correct: 2, 
                rationale: "The equipment list and procedure specify: 'Antiseptic solution (e.g., 2% chlorhexidine based)'."
            },
            {
                id: 6,
                question: "When cleaning the CVC exit site with a swab, which technique should the nurse utilize?",
                options: ["Back and forth motion", "Circular motion", "Vertical scrubbing", "Zigzag pattern"],
                correct: 1, 
                rationale: "The implementation step 6 states: 'Cleanse exit site with a swab with chlorhexidine 2% in a circular motion'."
            },
            {
                id: 7,
                question: "A nurse is cleansing from the insertion site toward the lumens. What is the correct direction of movement for this step?",
                options: ["In one direction", "Back and forth", "Circular motion", "Toward the insertion site"],
                correct: 0, 
                rationale: "Implementation step 8 states: 'Cleanse from the insertion site to the lumens in one direction'."
            },
            {
                id: 8,
                question: "The healthcare team is discussing strategies to prevent catheter-related bloodstream infections (CRBSI). Which statement is correct regarding antibiotic lock solutions?",
                options: ["They should be used routinely", "They should not be used routinely", "They are mandatory for all patients", "They replace sterile dressing changes"],
                correct: 1, 
                rationale: "Under General principles: 'Antibiotic lock solutions shouldn't be used routinely to prevent catheter related bloodstream infections'."
            },
            {
                id: 9,
                question: "During the assessment phase before a dressing change, the nurse checks the patient for allergies. Which specific allergy is most relevant to this procedure?",
                options: ["Latex allergy", "Adhesive tape allergy", "Penicillin allergy", "Food allergies"],
                correct: 1, 
                rationale: "Assessment point b-3 states: 'Assess patient for allergy (adhesive tape)'."
            },
            {
                id: 10,
                question: "A nurse is caring for a patient with a CVC. How frequently should the nurse assess the dressing to ensure it is occlusive, dry, and sterile?",
                options: ["Every 12 hours", "Every 24 hours", "Every 2-4 hours", "Once per shift"],
                correct: 2, 
                rationale: "General principles state: 'Assess the dressing every 2-4 hrs. and as necessary'."
            },
            {
                id: 11,
                question: "Upon assessment, a nurse identifies definitive signs of infection at the CVC insertion site. What is the required action?",
                options: ["Apply antibiotic ointment", "Change dressing immediately", "The catheter must be removed", "Observe for 24 hours"],
                correct: 2, 
                rationale: "General principles state: 'Assess S&S of infection (the catheter must be removed if signs of infection are present)'."
            },
            {
                id: 12,
                question: "Which of the following is a disadvantage of using a transparent dressing?",
                options: ["It is inexpensive", "It allows moisture accumulation", "It prevents site inspection", "It requires frequent changes"],
                correct: 1, 
                rationale: "The Transparent dressing table lists 'Allow for accumulation of moisture which increase the opportunity of microorganism transmission' as a disadvantage."
            },
            {
                id: 13,
                question: "What is a primary advantage of using a gauze dressing compared to a transparent one?",
                options: ["It absorbs moisture", "It allows continuous inspection", "It secures the device better", "It is waterproof"],
                correct: 0, 
                rationale: "The Gauze dressing table lists 'Absorbs moisture' as an advantage."
            },
            {
                id: 14,
                question: "A nurse is documenting the CVC dressing change. Which item is NOT required to be recorded according to the procedure?",
                options: ["Date and time", "Skin condition", "Patient's vital signs", "Type of dressing"],
                correct: 2, 
                rationale: "Documentation section requires: 'date, time, skin condition, type of antiseptic solution, type of dressing'. Vital signs are not listed here."
            },
            {
                id: 15,
                question: "Why should a nurse explain the dressing change procedure to the patient beforehand?",
                options: ["To gain cooperation and decrease anxiety", "To obtain written consent", "To assess cognitive function", "To determine discharge planning"],
                correct: 0, 
                rationale: "Preparation section rationale: 'To gain patient cooperation and decrease anxiety'."
            },
            {
                id: 16,
                question: "A nurse is removing an old CVC dressing. After discarding the dressing and gloves, what is the immediate next step?",
                options: ["Apply new sterile gloves", "Perform hand hygiene", "Cleanse with chlorhexidine", "Assess the skin"],
                correct: 1, 
                rationale: "Implementation step 5 states: 'H.H [Hand Hygiene] & apply sterile gloves' immediately after discarding old dressing/gloves."
            },
            {
                id: 17,
                question: "What is a disadvantage of gauze dressings regarding site monitoring?",
                options: ["It causes skin irritation", "Lack of continuous inspection of site", "It is too transparent", "It falls off easily"],
                correct: 1, 
                rationale: "The Gauze dressing table lists 'Lack of continuous inspection of insertion site' as a disadvantage."
            },
            {
                id: 18,
                question: "Regarding systemic antimicrobial prophylaxis for CVCs, what is the standard recommendation?",
                options: ["Administer before insertion", "Administer during use", "Should not be used routinely", "Give monthly doses"],
                correct: 2, 
                rationale: "General principles: 'Systemic antimicrobial prophylaxis shouldn't be routinely to prevent... CRBSI either before insertion or during the use'."
            },
            {
                id: 19,
                question: "A nurse checks the medical chart for the 'last dressing change time'. What is the clinical rationale for this assessment?",
                options: ["To decrease the risk of infection", "To audit supply usage", "To bill the patient correctly", "To evaluate nurse performance"],
                correct: 0, 
                rationale: "Assessment section rationale for assessing last dressing change time is 'To decrease the risk of infection'."
            },
            {
                id: 20,
                question: "According to recent studies mentioned in the text, what is true regarding frequent dressing changes?",
                options: ["They significantly reduce infection", "There is no benefit if dressing is clean and intact", "They are recommended for all patients", "They speed up healing"],
                correct: 1, 
                rationale: "The text states: 'Recent studies show that there is no benefits from frequent dressing change if it is clean and intact'."
            }
        ];

        // --- SHUFFLING LOGIC ---
        // This function shuffles the options for each question and updates the 'correct' index
        function shuffleOptions() {
            quizData.forEach(q => {
                // Keep track of the correct answer text
                const correctOptionText = q.options[q.correct];
                
                // Fisher-Yates shuffle algorithm
                for (let i = q.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
                }
                
                // Find the new index of the correct answer
                q.correct = q.options.indexOf(correctOptionText);
            });
        }

        // Initialize shuffle before rendering
        shuffleOptions();

        const container = document.getElementById('quiz-container');
        let score = 0;
        let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${index}, ${i})" 
                                class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white">
                                <span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-blue-400">
                                    <div class="w-2.5 h-2.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></div>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <div class="flex items-start gap-3">
                            <i class="fas fa-info-circle text-blue-500 mt-1"></i>
                            <div>
                                <p class="font-bold text-blue-900 text-sm mb-1">Rationale</p>
                                <p class="text-blue-800 text-sm leading-relaxed">${q.rationale}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const question = quizData[qIndex];
            const feedbackEl = document.getElementById(`feedback-${qIndex}`);
            const buttons = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (feedbackEl.classList.contains('block')) return; 
            feedbackEl.classList.remove('hidden-content');
            feedbackEl.classList.add('block');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-blue-50', 'hover:border-blue-300', 'bg-white');
                const iconContainer = btn.lastElementChild;
                if (i === question.correct) {
                    btn.classList.add('correct-answer');
                    iconContainer.innerHTML = '<i class="fas fa-check text-green-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else if (i === optIndex) {
                    btn.classList.add('wrong-answer');
                    iconContainer.innerHTML = '<i class="fas fa-times text-red-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else {
                    btn.classList.add('opacity-50');
                }
            });
            answeredCount++;
            if (optIndex === question.correct) score++;
            if (answeredCount === quizData.length) {
                const resultDiv = document.getElementById('result-summary');
                resultDiv.classList.remove('hidden-content');
                document.getElementById('score-display').textContent = score;
                document.getElementById('total-display').innerText = `/ ${quizData.length}`;
                const messageEl = document.getElementById('score-message');
                const percentage = (score / quizData.length) * 100;
                if (percentage === 100) messageEl.textContent = "Perfect Score!";
                else if (percentage >= 75) messageEl.textContent = "Great Job!";
                else if (percentage >= 50) messageEl.textContent = "Good effort.";
                else messageEl.textContent = "Keep studying!";
                setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
