<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Removal of the Central Venous Catheter</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-check text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- QUIZ DATA ---
        const quizData = [
            {
                id: 1,
                question: "Which of the following is an indication for the removal of a Central Venous Catheter (CVC)?",
                options: ["Routine weekly replacement", "Mechanical malfunction of the catheter", "Patient transfer to another ward", "Elevated blood pressure readings"],
                correct: 1, 
                rationale: "Indications for removal include mechanical malfunction of the CVC, such as occlusion or malpositioning."
            },
            {
                id: 2,
                question: "Before removing the CVC, why must the nurse assess the patient's coagulation profile?",
                options: ["To determine the need for antibiotics", "To take precaution and prevent bleeding", "To assess for electrolyte imbalances", "To evaluate renal function status"],
                correct: 1, 
                rationale: "The chart is assessed for the physician order and lab data (coagulation profile) to take precaution and prevent bleeding."
            },
            {
                id: 3,
                question: "During assessment, what specific signs at the catheter site would indicate a potential infection?",
                options: ["Coolness and pallor", "Redness, warmth, or tenderness", "Bruising and hematoma", "Dryness and intact skin"],
                correct: 1, 
                rationale: "The nurse assesses the catheter site for redness, warmth, tenderness, or presence of drainage to assess for signs and symptoms of infection."
            },
            {
                id: 4,
                question: "What should the nurse verify regarding intravenous access before removing a CVC?",
                options: ["Ensure a patent peripheral line exists", "Verify the central line is still patent", "Check if an arterial line is present", "Confirm oral medication tolerance"],
                correct: 0, 
                rationale: "The nurse must check if a peripheral line is patent; if not, a new line should be started before CVC removal."
            },
            {
                id: 5,
                question: "What is the recommended patient position for CVC removal to ensure safety?",
                options: ["High Fowler's position", "Supine position", "Left lateral position", "Prone position"],
                correct: 1, 
                rationale: "The nurse should position the patient in the supine position during the preparation phase."
            },
            {
                id: 6,
                question: "Which symptom should the patient be instructed to report immediately during the procedure?",
                options: ["Mild hunger or thirst", "Shortness of breath or chest pain", "Itching at the removal site", "Urge to void urine"],
                correct: 1, 
                rationale: "The patient is instructed to report any signs and symptoms of shortness of breath, chest pain, groin pain, or any changes."
            },
            {
                id: 7,
                question: "Which antiseptic solution is specified for cleansing the insertion site before removal?",
                options: ["Povidone-iodine 10%", "Alcohol 70%", "Chlorhexidine 2%", "Normal saline 0.9%"],
                correct: 2, 
                rationale: "The equipment list and implementation steps specify the use of Chlorhexidine 2% for cleansing the site."
            },
            {
                id: 8,
                question: "What is the primary rationale for turning off IV infusions prior to CVC removal?",
                options: ["To prevent fluid overload", "To early recognize complications", "To stop medication administration", "To prepare the tubing for disposal"],
                correct: 1, 
                rationale: "Turning off I.V infusions is done for early recognition of complications."
            },
            {
                id: 9,
                question: "Why should the patient be instructed to take a deep breath and hold it during removal of an internal jugular catheter?",
                options: ["To distract the patient from pain", "To minimize air drawn into circulation", "To increase venous return to the heart", "To facilitate easier suture removal"],
                correct: 1, 
                rationale: "Instructing the patient to hold their breath helps minimize air that may be accidentally drawn into circulation."
            },
            {
                id: 10,
                question: "During which phase of the respiratory cycle should the catheter be withdrawn?",
                options: ["During the expiratory phase", "During the inspiratory phase", "During the coughing phase", "During rapid shallow breathing"],
                correct: 1, 
                rationale: "Withdraw the catheter during the inspiratory phase of the respiratory cycle."
            },
            {
                id: 11,
                question: "How should the catheter be withdrawn to prevent trauma to the vein?",
                options: ["In a rapid jerking motion", "In one continuous slow motion", "In small incremental steps", "In a twisting rotating motion"],
                correct: 1, 
                rationale: "Grasp the catheter with your dominant hand and withdraw the catheter in one continuous motion slowly."
            },
            {
                id: 12,
                question: "How long should pressure be applied to the puncture site after removal?",
                options: ["For exactly 1 minute", "For 2 to 3 minutes", "For 5 minutes until bleeding stops", "For 10 minutes regardless of bleeding"],
                correct: 2, 
                rationale: "Apply pressure over the puncture site with a sterile gauze 4x4 for 5 minutes till bleeding is stopped."
            },
            {
                id: 13,
                question: "What is the purpose of applying an occlusive sterile dressing after removal?",
                options: ["To absorb excessive drainage", "To prevent air entry and bleeding", "To visualize the insertion site", "To allow the wound to breathe"],
                correct: 1, 
                rationale: "An occlusive sterile dressing is applied to prevent air entry, bleeding, hematoma, and ensure hemostasis."
            },
            {
                id: 14,
                question: "Why is it important to inspect the catheter tip after removal?",
                options: ["To measure the catheter length", "To ensure the entire catheter is removed", "To check for blood clots in the lumen", "To determine the catheter brand"],
                correct: 1, 
                rationale: "Inspect the catheter after removal for integrity to ensure that the entire catheter has been removed."
            },
            {
                id: 15,
                question: "How frequently should the dressing be inspected immediately after the procedure?",
                options: ["Every hour for 4 hours", "Every 5 minutes for 30 minutes", "First 15 minutes then every 15 minutes for an hour", "Once after 30 minutes"],
                correct: 2, 
                rationale: "Inspect the dressing for the first 15 minutes after catheter removal & every 15 minutes for the next hour."
            },
            {
                id: 16,
                question: "What is the recommended duration of bed rest after CVC removal?",
                options: ["10 minutes", "30 minutes", "1 hour", "2 hours"],
                correct: 1, 
                rationale: "Maintain bed rest for 30 minutes after catheter removal to decrease the risk for air emboli."
            },
            {
                id: 17,
                question: "If an air embolus is suspected, how should the patient be positioned?",
                options: ["Supine with head elevated", "Right lateral decubitus position", "Left side in Trendelenburg position", "High Fowler's position"],
                correct: 2, 
                rationale: "Position patient on the left side & in Trendelenburg position if an embolus is suspected."
            },
            {
                id: 18,
                question: "Which of the following is listed as a potential complication of CVC removal?",
                options: ["Hypertensive crisis", "Air embolism", "Severe dehydration", "Hypoglycemia"],
                correct: 1, 
                rationale: "Complications associated with removal include Air embolism, Bleeding/hematoma, and Dislodgment of thrombus."
            },
            {
                id: 19,
                question: "What should be done with the catheter tip if infection is suspected?",
                options: ["Discard it in the biohazard bin", "Cut it into a sterile container for culture", "Clean it with alcohol and save it", "Place it in formalin for biopsy"],
                correct: 1, 
                rationale: "Cut off tip of the catheter into a sterile container & send it to lab for culture (if needed)."
            },
            {
                id: 20,
                question: "What should the nurse document regarding the patient's condition after the procedure?",
                options: ["Patient's family history", "Patient reaction to the procedure", "Patient's dietary preferences", "Patient's sleep pattern"],
                correct: 1, 
                rationale: "Documentation includes the date, time of CVC removal, patient reaction, and condition of the insertion site."
            }
        ];

        // --- SHUFFLE LOGIC ---
        // This function shuffles the options and updates the 'correct' index for each question
        function shuffleOptions() {
            quizData.forEach(q => {
                // 1. Identify the correct answer text
                const correctAnswerText = q.options[q.correct];
                
                // 2. Shuffle the options array using Fisher-Yates algorithm
                for (let i = q.options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
                }
                
                // 3. Find the new index of the correct answer
                q.correct = q.options.indexOf(correctAnswerText);
            });
        }

        const container = document.getElementById('quiz-container');
        let score = 0;
        let answeredCount = 0;

        function renderQuiz() {
            // Shuffle before rendering
            shuffleOptions();

            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${index}, ${i})" 
                                class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white">
                                <span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-blue-400">
                                    <div class="w-2.5 h-2.5 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 transition"></div>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <div class="flex items-start gap-3">
                            <i class="fas fa-info-circle text-blue-500 mt-1"></i>
                            <div>
                                <p class="font-bold text-blue-900 text-sm mb-1">Rationale</p>
                                <p class="text-blue-800 text-sm leading-relaxed">${q.rationale}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const question = quizData[qIndex];
            const feedbackEl = document.getElementById(`feedback-${qIndex}`);
            const buttons = document.querySelectorAll(`.option-btn-${qIndex}`);
            
            if (feedbackEl.classList.contains('block')) return; 
            
            feedbackEl.classList.remove('hidden-content');
            feedbackEl.classList.add('block');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-blue-50', 'hover:border-blue-300', 'bg-white');
                const iconContainer = btn.lastElementChild;
                
                if (i === question.correct) {
                    btn.classList.add('correct-answer');
                    iconContainer.innerHTML = '<i class="fas fa-check text-green-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else if (i === optIndex) {
                    btn.classList.add('wrong-answer');
                    iconContainer.innerHTML = '<i class="fas fa-times text-red-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            answeredCount++;
            if (optIndex === question.correct) score++;

            if (answeredCount === quizData.length) {
                const resultDiv = document.getElementById('result-summary');
                resultDiv.classList.remove('hidden-content');
                document.getElementById('score-display').textContent = score;
                document.getElementById('total-display').innerText = `/ ${quizData.length}`;
                
                const messageEl = document.getElementById('score-message');
                const percentage = (score / quizData.length) * 100;
                
                if (percentage === 100) messageEl.textContent = "Perfect Score!";
                else if (percentage >= 75) messageEl.textContent = "Great Job!";
                else if (percentage >= 50) messageEl.textContent = "Good effort.";
                else messageEl.textContent = "Keep studying!";
                
                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 500);
            }
        };

        renderQuiz();
    </script>
</body>
</html>
