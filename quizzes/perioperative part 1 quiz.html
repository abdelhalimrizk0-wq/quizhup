<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Perioperative Nursing part 1</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        <div id="quiz-container"></div>
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY (GENERATE 50 QUESTIONS HERE) ---
        const rawQuizData = [
            {
                question: "Which term describes the surgical formation of an artificial opening?",
                options: ["Ectomy", "Otomy", "Ostomy", "Plasty"],
                correct: 2,
                rationale: "The suffix -ostomy refers to the formation of an artificial opening, such as in a colostomy."
            },
            {
                question: "What is the primary responsibility of the circulating nurse regarding the sterile field?",
                options: ["Performing the surgical hand scrub", "Donning a sterile gown and gloves", "Observing for breaks in aseptic technique", "Handling surgical instruments directly"],
                correct: 2,
                rationale: "The circulating nurse observes the sterile field closely for any breaks in aseptic technique and reports them."
            },
            {
                question: "Which phase of perioperative care begins with admission to the recovery area?",
                options: ["Preoperative", "Intraoperative", "Postoperative", "Perioperative"],
                correct: 2,
                rationale: "The postoperative phase begins with admission to the recovery area and continues until follow-up or discharge."
            },
            {
                question: "Which condition is defined as a break in the continuity of the tissue surface?",
                options: ["Obstruction", "Perforation", "Erosion", "Tumor"],
                correct: 2,
                rationale: "Erosion is defined as a break in the continuity of tissue surface, often caused by irritation or infection."
            },
            {
                question: "True or False: A barrel chest is typically associated with chronic obstructive lung disease.",
                options: ["True", "False"],
                correct: 0,
                rationale: "A barrel chest is an increase in anteroposterior diameter often seen in patients with chronic obstructive lung disease."
            },
            {
                question: "How long should a patient generally fast from food and fluids before surgery?",
                options: ["2 to 4 hours", "6 to 8 hours", "10 to 12 hours", "24 to 48 hours"],
                correct: 2,
                rationale: "Generally, the fasting period ranges from 10 to 12 hours preoperatively to prevent aspiration."
            },
            {
                question: "Which surgical suffix indicates the removal of an organ by cutting?",
                options: ["Orrhaphy", "Ectomy", "Oscopy", "Plasty"],
                correct: 1,
                rationale: "The suffix -ectomy refers to removal by cutting, such as in an appendectomy."
            },
            {
                question: "What is the main purpose of administering atropine preoperatively?",
                options: ["To induce sleep", "To relieve pain", "To decrease oral secretions", "To prevent infection"],
                correct: 2,
                rationale: "Atropine is given to decrease oral secretions and prevent aspiration."
            },
            {
                question: "Which type of surgery is performed to relieve pain or correct a problem without curing the underlying disease?",
                options: ["Diagnostic", "Palliative", "Reparative", "Cosmetic"],
                correct: 1,
                rationale: "Palliative surgery is performed to relieve pain or correct a problem, such as inserting a feeding tube."
            },
            {
                question: "True or False: The scrub nurse is responsible for documenting the operative record.",
                options: ["True", "False"],
                correct: 1,
                rationale: "The circulating nurse is responsible for documenting the operative record and nurses' notes."
            },
            {
                question: "Which incision begins below the umbilicus and extends toward the right flank?",
                options: ["Pfannenstiel", "McBurney", "Subcostal", "Midline"],
                correct: 1,
                rationale: "The McBurney incision is used for appendectomy and goes through McBurney's point toward the right flank."
            },
            {
                question: "What is the definition of ambulatory surgery?",
                options: ["Surgery requiring 3 days of stay", "Surgery requiring fewer than 24 hours", "Surgery performed only in emergency rooms", "Surgery for bedridden patients"],
                correct: 1,
                rationale: "Ambulatory surgery is defined as surgery that requires fewer than 24 hours of hospitalization."
            },
            {
                question: "Which stage of general anesthesia involves excitement and uncontrolled movements?",
                options: ["Stage 1", "Stage 2", "Stage 3", "Stage 4"],
                correct: 1,
                rationale: "Stage 2 is the excitement stage where the client may shout, move uncontrollably, or laugh."
            },
            {
                question: "What is a potential complication of spinal anesthesia caused by cerebrospinal fluid leakage?",
                options: ["Hypertension", "Headache", "Hyperthermia", "Tachycardia"],
                correct: 1,
                rationale: "A postdural puncture headache may occur due to leakage of cerebrospinal fluid from the needle hole."
            },
            {
                question: "True or False: Informed consent acts as a legal protection for both the patient and the surgeon.",
                options: ["True", "False"],
                correct: 0,
                rationale: "Informed consent protects the patient from unsanctioned surgery and the surgeon from claims of unauthorized operation."
            },
            {
                question: "Which medication type is assessed preoperatively due to the risk of adrenal insufficiency?",
                options: ["Antibiotics", "Corticosteroids", "Diuretics", "Anticoagulants"],
                correct: 1,
                rationale: "Patients who have received corticosteroids are at risk for adrenal insufficiency and this must be reported."
            },
            {
                question: "What is the primary goal of preoperative skin preparation?",
                options: ["To sterilize the deeper tissues", "To decrease bacteria without injury", "To remove all hair from the body", "To warm the skin before incision"],
                correct: 1,
                rationale: "The goal is to decrease bacteria on the skin without injuring the skin itself."
            },
            {
                question: "Which classification of surgery urgency requires performance within 24 to 48 hours?",
                options: ["Emergent", "Urgent", "Required", "Elective"],
                correct: 1,
                rationale: "Imperative Urgent surgery must be performed within 24 to 48 hours."
            },
            {
                question: "True or False: General anesthesia causes the loss of sensation without the loss of consciousness.",
                options: ["True", "False"],
                correct: 1,
                rationale: "General anesthesia causes the loss of sensation, reflexes, and consciousness. Regional/Local anesthesia preserves consciousness."
            },
            {
                question: "Which surgical team member is responsible for handing instruments to the surgeon?",
                options: ["Circulating nurse", "Anesthesiologist", "Scrub nurse", "Radiology technician"],
                correct: 2,
                rationale: "The scrub nurse hands the surgeon instruments, sponges, and necessary supplies during the procedure."
            },
            {
                question: "What does the suffix -orrhaphy indicate?",
                options: ["Removal by cutting", "Suture or repair", "Looking into", "Incision or cutting"],
                correct: 1,
                rationale: "The suffix -orrhaphy means suture of or repair, as in herniorrhaphy."
            },
            {
                question: "Which organ function is primarily assessed by blood urea nitrogen and creatinine tests?",
                options: ["Liver", "Heart", "Kidney", "Lung"],
                correct: 2,
                rationale: "Blood urea nitrogen and creatinine tests are used to detect kidney problems."
            },
            {
                question: "What is the recommended time for smoking cessation prior to surgery for patients with chronic lung disorders?",
                options: ["24 hours", "3 to 4 days", "3 to 4 weeks", "3 to 4 months"],
                correct: 2,
                rationale: "Patients with chronic lung disorders should avoid smoking for 3 to 4 weeks before surgery."
            },
            {
                question: "True or False: Elective surgery is considered absolutely necessary for survival.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Elective surgery is defined as not absolutely necessary."
            },
            {
                question: "Which type of anesthesia is injected into the subarachnoid space?",
                options: ["Local infiltration", "Nerve block", "Epidural block", "Spinal block"],
                correct: 3,
                rationale: "Spinal anesthesia involves injection of a local agent into the subarachnoid space."
            },
            {
                question: "What is a major risk associated with obesity in surgical patients?",
                options: ["Rapid wound healing", "Decreased anesthetic needs", "Respiratory complications", "Hypothermia"],
                correct: 2,
                rationale: "Obesity increases the risk for respiratory, cardiovascular, and gastrointestinal complications."
            },
            {
                question: "Which incision is typically used for a cesarean section or hysterectomy?",
                options: ["Sternal Split", "Pfannenstiel", "Thoracoabdominal", "Oblique Subcostal"],
                correct: 1,
                rationale: "The Pfannenstiel incision is a curved transverse cut across the lower abdomen used for the uterus and ovaries."
            },
            {
                question: "True or False: The circulating nurse is a sterile member of the surgical team.",
                options: ["True", "False"],
                correct: 1,
                rationale: "The circulating nurse is a non-sterile member who manages the room and supplies outside the sterile field."
            },
            {
                question: "What is the purpose of a diagnostic surgical procedure?",
                options: ["To remove a diseased organ", "To determine the cause of symptoms", "To repair a congenital defect", "To improve cosmetic appearance"],
                correct: 1,
                rationale: "Diagnostic surgery, like a biopsy, is used to determine the origin and cause of a disorder."
            },
            {
                question: "Which item must be removed preoperatively to prevent respiratory obstruction?",
                options: ["Wedding ring", "Dentures", "Identification band", "Hearing aid"],
                correct: 1,
                rationale: "Dentures are removed to prevent injury or respiratory obstruction during anesthesia."
            },
            {
                question: "True or False: Older adults are less likely to become dehydrated during surgery.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Older adults are more likely to become dehydrated and are less able to adapt to fluid loss."
            },
            {
                question: "Which intraoperative complication is caused by the administration of cold IV fluids?",
                options: ["Hyperthermia", "Hypothermia", "Hypertension", "Hyperglycemia"],
                correct: 1,
                rationale: "Administration of cold IV fluids and inhalation of cool gases are causes of hypothermia in the OR."
            },
            {
                question: "What is the definition of the suffix -plasty?",
                options: ["Incision into", "Removal of", "Formation or repair", "Looking inside"],
                correct: 2,
                rationale: "The suffix -plasty refers to formation or repair, such as in mammoplasty."
            },
            {
                question: "Which type of surgery repairs a congenitally defective organ?",
                options: ["Constructive", "Reconstructive", "Palliative", "Diagnostic"],
                correct: 0,
                rationale: "Constructive surgery repairs congenitally defective organs, such as plastic surgery for a cleft palate."
            },
            {
                question: "True or False: Emergency surgery requires signed consent even if the patient's life is at risk and they are unconscious.",
                options: ["True", "False"],
                correct: 1,
                rationale: "In a life-threatening emergency, consent to treat and stabilize is not essential if it cannot be obtained."
            },
            {
                question: "What does the intraoperative phase include?",
                options: ["The decision to have surgery", "The entire surgical procedure", "Admission to the recovery room", "The discharge process"],
                correct: 1,
                rationale: "The intraoperative phase includes the entire surgical procedure until transfer to the recovery area."
            },
            {
                question: "Which test is used to detect prolonged bleeding problems preoperatively?",
                options: ["Serum electrolytes", "Bleeding time", "Blood urea nitrogen", "Chest x-ray"],
                correct: 1,
                rationale: "Bleeding time, along with PT and PTT, is used to detect clotting or bleeding problems."
            },
            {
                question: "What is the primary purpose of coughing and deep breathing exercises postoperatively?",
                options: ["To improve digestion", "To prevent venous stasis", "To decrease respiratory complications", "To relieve surgical pain"],
                correct: 2,
                rationale: "These exercises are taught to decrease respiratory complications like pneumonia and atelectasis."
            },
            {
                question: "True or False: Stage 4 of anesthesia is the desired level for surgical procedures.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Stage 3 is surgical anesthesia. Stage 4 is medullary depression (overdose) and can lead to death."
            },
            {
                question: "Which factor specifically increases the risk of wound infection and delayed healing?",
                options: ["Young age", "Nutritional deficiency", "High fluid intake", "Regular exercise"],
                correct: 1,
                rationale: "Nutritional deficiencies place the client at greater risk for delayed wound healing and wound infections."
            },
            {
                question: "What is the purpose of the 'Time Out' or verification before surgery begins?",
                options: ["To rest the surgical team", "To check equipment sterilization", "To verify patient, site, and procedure", "To wait for anesthesia to take effect"],
                correct: 2,
                rationale: "The checklist helps verify the correct patient, correct site, and correct procedure to prevent errors."
            },
            {
                question: "Which category of surgery is performed to restore a damaged organ to its original appearance?",
                options: ["Constructive", "Reconstructive", "Palliative", "Curative"],
                correct: 1,
                rationale: "Reconstructive surgery restores a damaged organ or tissue to its original appearance and function."
            },
            {
                question: "True or False: A scrub nurse counts sponges and needles with the circulating nurse.",
                options: ["True", "False"],
                correct: 0,
                rationale: "Both the scrub nurse and circulating nurse perform counts of sponges, needles, and instruments to prevent retention."
            },
            {
                question: "What is the standard method for hair removal if required before surgery?",
                options: ["Shaving with a razor", "Using electric clippers", "Applying depilatory cream", "Plucking with tweezers"],
                correct: 1,
                rationale: "Electric clippers are used for safe hair removal to decrease the risk of skin injury compared to razors."
            },
            {
                question: "Which nursing assessment finding would indicate a potential fluid volume deficit?",
                options: ["Distended jugular veins", "Edema in extremities", "Poor skin turgor", "Increased blood pressure"],
                correct: 2,
                rationale: "Poor skin turgor and dry mucous membranes are signs of dehydration or fluid volume deficit."
            },
            {
                question: "What is the effect of general anesthesia on the central nervous system?",
                options: ["It stimulates the system", "It blocks only motor nerves", "It depresses the system", "It has no effect on the system"],
                correct: 2,
                rationale: "General anesthesia acts directly on the central nervous system to produce loss of sensation and consciousness."
            },
            {
                question: "Which incision is located in the epigastric area and extends laterally below the costal margin?",
                options: ["Midline", "Oblique Subcostal", "Thoracoabdominal", "McBurney"],
                correct: 1,
                rationale: "The Oblique Subcostal incision begins in the epigastric area and extends laterally below the lower costal margin."
            },
            {
                question: "True or False: Palliative surgery is intended to cure the disease.",
                options: ["True", "False"],
                correct: 1,
                rationale: "Palliative surgery relieves symptoms or pain but does not cure the underlying disease."
            },
            {
                question: "Which electrolyte imbalance is detected by serum electrolyte tests?",
                options: ["Hemoglobin", "Potassium", "Platelets", "White blood cells"],
                correct: 1,
                rationale: "Electrolyte tests detect imbalances in sodium, potassium, and chloride."
            },
            {
                question: "What is the primary role of the anesthesiologist in the operating room?",
                options: ["Sterilizing the instruments", "Administering anesthesia and monitoring the client", "Performing the surgical incision", "Organizing the sterile field"],
                correct: 1,
                rationale: "The anesthesiologist administers anesthesia and monitors the client's vital functions during surgery."
            }
        ];

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            container.innerHTML = quizData.map((q, index) => {
                return `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                         ${q.options.length === 2 ? '<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md">True/False</span>' : ''}
                    </div>
                    <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                    <div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-2' : ''}">
                        ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                    </div>
                    <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                        <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
