            { id: 1, question: "What is the normal range for arterial pH?", options: ["7.25-7.35", "7.35-7.45", "7.45-7.55", "7.15-7.25"], correct: 1, rationale: "The normal arterial pH range is 7.35 to 7.45." },
            { id: 2, question: "Which equation relates pH, pCO2, and HCO3?", options: ["Bernoulli Equation", "Henderson Equation", "Starling Equation", "Nernst Equation"], correct: 1, rationale: "The Henderson Equation describes the relationship between pH, bicarbonate, and partial pressure of carbon dioxide." },
            { id: 3, question: "What does the Anion Gap primarily reflect?", options: ["Unaccounted positively charged ions", "Unaccounted negatively charged species", "Total body water", "Serum osmolality"], correct: 1, rationale: "The Anion Gap reflects the unaccounted for negatively charged species in the blood." },
            { id: 4, question: "Which condition is characterized by a pH < 7.35 and pCO2 > 45 mmHg?", options: ["Metabolic Acidosis", "Respiratory Acidosis", "Metabolic Alkalosis", "Respiratory Alkalosis"], correct: 1, rationale: "Respiratory Acidosis is defined by a low pH (acidemia) and an elevated pCO2." },
            { id: 5, question: "What is the primary compensatory mechanism for Metabolic Acidosis?", options: ["Renal retention of bicarbonate", " renal excretion of acid", "Hyperventilation to decrease pCO2", "Hypoventilation to increase pCO2"], correct: 2, rationale: "The respiratory system compensates for metabolic acidosis by hyperventilating to lower pCO2." },
            { id: 6, question: "The normal range for the Anion Gap is:", options: ["3-7 mmol/L", "8-12 mmol/L", "15-20 mmol/L", "20-25 mmol/L"], correct: 1, rationale: "The normal reference range for the Anion Gap is 8-12 mmol/L." },
            { id: 7, question: "Which of the following is a cause of High Anion Gap Metabolic Acidosis?", options: ["Diarrhea", "Renal Tubular Acidosis", "Diabetic Ketoacidosis", "Fistulas"], correct: 2, rationale: "Diabetic Ketoacidosis introduces ketones, which are unmeasured anions, increasing the gap." },
            { id: 8, question: "A Delta Delta ratio between 1 and 2 suggests:", options: ["Pure high anion gap metabolic acidosis", "Mixed metabolic alkalosis", "Pure non-gap metabolic acidosis", "Respiratory acidosis"], correct: 0, rationale: "A Delta Delta ratio of 1-2 indicates a pure high anion gap metabolic acidosis." },
            { id: 9, question: "Which electrolyte abnormality is commonly seen in the recovery phase of DKA?", options: ["Hypernatremia", "Hyperchloremia", "Hypocalcemia", "Hypermagnesemia"], correct: 1, rationale: "Hyperchloremic metabolic acidosis often develops during the recovery phase of DKA due to fluid resuscitation and ketone loss." },
            { id: 10, question: "Severe acidemia (pH <= 7.25) can lead to:", options: ["Increased cardiac output", "Decreased catecholamine responsiveness", "Increased insulin sensitivity", "Arteriolar constriction"], correct: 1, rationale: "Severe acidemia reduces the responsiveness of the cardiovascular system to catecholamines." },
            { id: 11, question: "Respiratory Alkalosis is characterized by:", options: ["pH > 7.45 and pCO2 < 35 mmHg", "pH < 7.35 and pCO2 > 45 mmHg", "pH > 7.45 and HCO3 > 26 mmol/L", "pH < 7.35 and HCO3 < 22 mmol/L"], correct: 0, rationale: "Respiratory Alkalosis presents with an elevated pH and a decreased pCO2 due to hyperventilation." },
            { id: 12, question: "Which of the following causes Metabolic Alkalosis?", options: ["Methanol ingestion", "Severe vomiting", "Diabetic Ketoacidosis", "Renal failure"], correct: 1, rationale: "Severe vomiting leads to the loss of gastric acid (HCl), resulting in Metabolic Alkalosis." },
            { id: 13, question: "In chronic respiratory acidosis, for every 10 mmHg increase in pCO2, HCO3 increases by:", options: ["1 mmol/L", "3 mmol/L", "4 mmol/L", "5 mmol/L"], correct: 1, rationale: "In chronic respiratory acidosis, the kidneys compensate by retaining 3 mmol/L of HCO3 for every 10 mmHg rise in pCO2." },
            { id: 14, question: "True or False: Compensation is equivalent to correction of the acid-base disorder.", options: ["True", "False"], correct: 1, rationale: "Compensation mitigates the pH change but does not correct the underlying cause." },
            { id: 15, question: "Which formula is used to calculate the expected pCO2 in Metabolic Acidosis?", options: ["Hendersons Formula", "Winters Formula", "Starling Law", "Fick Principle"], correct: 1, rationale: "Winters Formula (1.5 x HCO3 + 8 +/- 2) estimates the expected respiratory compensation." },
            { id: 16, question: "The predominant extracellular cation is:", options: ["Potassium", "Sodium", "Calcium", "Magnesium"], correct: 1, rationale: "Sodium is the major cation in the extracellular fluid compartment." },
            { id: 17, question: "Hypovolemic Hypernatremia with urine Na < 20 mmol/L suggests:", options: ["Renal loss", "Extrarenal loss", "Excess sodium intake", "Diabetes Insipidus"], correct: 1, rationale: "Low urine sodium in the setting of hypovolemia indicates the kidneys are retaining sodium, suggesting extrarenal loss (e.g., sweating, diarrhea)." },
            { id: 18, question: "Rapid correction of Hypernatremia can cause:", options: ["Central Pontine Myelinolysis", "Cerebral Edema", "Pulmonary Embolism", "Renal Failure"], correct: 1, rationale: "Reducing sodium too quickly allows water to rush into brain cells, causing cerebral edema." },
            { id: 19, question: "Which IV fluid is hypotonic?", options: ["0.9% Normal Saline", "Lactated Ringers", "0.45% Sodium Chloride", "3% Sodium Chloride"], correct: 2, rationale: "0.45% Sodium Chloride (Half Normal Saline) has a lower osmolality than plasma." },
            { id: 20, question: "Hyponatremia is defined as serum sodium less than:", options: ["145 mEq/L", "135 mEq/L", "125 mEq/L", "115 mEq/L"], correct: 1, rationale: "Hyponatremia is defined as a serum sodium concentration below 135 mEq/L." },
            { id: 21, question: "SIADH typically causes which type of hyponatremia?", options: ["Hypovolemic", "Euvolemic", "Hypervolemic", "Hypertonic"], correct: 1, rationale: "SIADH leads to water retention without significant volume overload or depletion, resulting in Euvolemic Hyponatremia." },
            { id: 22, question: "A characteristic ECG change in Hyperkalemia is:", options: ["U waves", "ST depression", "Peaked T waves", "Shortened QT interval"], correct: 2, rationale: "Tall, peaked T waves are an early sign of hyperkalemia." },

            { id: 25, question: "Trousseau's sign is associated with which electrolyte imbalance?", options: ["Hypercalcemia", "Hypocalcemia", "Hyperkalemia", "Hypokalemia"], correct: 1, rationale: "Trousseau's sign (carpopedal spasm) indicates increased neuromuscular irritability due to hypocalcemia." },
            { id: 26, question: "Which diuretic acts on the Loop of Henle?", options: ["Spironolactone", "Hydrochlorothiazide", "Furosemide", "Acetazolamide"], correct: 2, rationale: "Furosemide is a loop diuretic that inhibits sodium reabsorption in the Loop of Henle." },
            { id: 27, question: "True or False: Albumin is a crystalloid fluid.", options: ["True", "False"], correct: 1, rationale: "Albumin is a colloid, not a crystalloid." },
            { id: 28, question: "ARDS is characterized by which type of pulmonary edema?", options: ["Cardiogenic", "Non-cardiogenic", "Hydrostatic", "Lymphatic"], correct: 1, rationale: "ARDS causes non-cardiogenic pulmonary edema due to increased capillary permeability." },
            { id: 29, question: "The 'Berlin Definition' classifies ARDS based on:", options: ["Chest X-ray findings alone", "Serum Lactate", "PaO2/FiO2 ratio", "Duration of symptoms only"], correct: 2, rationale: "The Berlin Definition uses the PaO2/FiO2 ratio to classify ARDS severity." },

            { id: 32, question: "Prone positioning in ARDS aims to:", options: ["Increase chest wall compliance", "Improve V/Q matching", "Reduce cardiac output", "Increase dead space"], correct: 1, rationale: "Prone positioning recruits dorsal lung regions and improves ventilation-perfusion matching." },
            { id: 33, question: "VAP stands for:", options: ["Venous Arterial Pressure", "Ventilator Associated Pneumonia", "Viral Acute Pneumonia", "Ventilatory Acquired Pathology"], correct: 1, rationale: "VAP stands for Ventilator-Associated Pneumonia." },
            { id: 34, question: "VAP is defined as pneumonia occurring how many hours after intubation?", options: ["> 12 hours", "> 24 hours", "> 48 hours", "> 72 hours"], correct: 2, rationale: "VAP is defined as pneumonia developing more than 48 hours after endotracheal intubation." },
            { id: 35, question: "Which is a component of the VAP prevention bundle?", options: ["Supine positioning", "Deep sedation", "Head of bed elevation 30-45 degrees", "Routine antibiotic prophylaxis"], correct: 2, rationale: "Elevating the head of the bed helps prevent aspiration, a key cause of VAP." },
            { id: 36, question: "AKI is characterized by an abrupt decline in:", options: ["Liver function", "Renal filtration function", "Cardiac output", "Respiratory drive"], correct: 1, rationale: "AKI is defined as a sudden decrease in kidney filtration function." },

            { id: 38, question: "True or False: Dopamine is recommended for the prevention of AKI.", options: ["True", "False"], correct: 1, rationale: "Routine use of dopamine for AKI prevention is no longer justified and may be harmful." },
            { id: 39, question: "Which is an indication for Renal Replacement Therapy (RRT)?", options: ["Mild hyponatremia", "Refractory Hyperkalemia", "Stage 1 AKI", "Controlled hypertension"], correct: 1, rationale: "Refractory hyperkalemia that does not respond to medical management is a classic indication for dialysis." },
            { id: 40, question: "The RIFLE criteria 'Risk' category requires a creatinine increase of:", options: ["1.5 x baseline", "2 x baseline", "3 x baseline", "4 x baseline"], correct: 0, rationale: "The Risk category in RIFLE corresponds to a 1.5-fold increase in serum creatinine." },
            { id: 41, question: "The normal range for pCO2 is:", options: ["25-35 mmHg", "35-45 mmHg", "45-55 mmHg", "55-65 mmHg"], correct: 1, rationale: "Normal arterial pCO2 is 35-45 mmHg." },
            { id: 42, question: "Metabolic Acidosis is indicated by:", options: ["Low HCO3", "High HCO3", "Low pCO2", "High pCO2"], correct: 0, rationale: "Metabolic acidosis is primarily characterized by a decrease in bicarbonate (HCO3)." },
            { id: 43, question: "Which of the following causes Normal Anion Gap Metabolic Acidosis?", options: ["Methanol", "Uremia", "Renal Tubular Acidosis", "Lactic Acidosis"], correct: 2, rationale: "Renal Tubular Acidosis causes acidosis by bicarbonate loss or acid retention without adding unmeasured anions." },
            { id: 44, question: "The formula for calculated osmolarity includes Sodium, Glucose, and:", options: ["Chloride", "BUN", "Potassium", "Albumin"], correct: 1, rationale: "Serum osmolarity is calculated using Sodium, Glucose, and BUN." },
            { id: 45, question: "Hypermagnesemia is defined as serum magnesium greater than:", options: ["1.5 mEq/L", "2.0 mEq/L", "2.5 mEq/L", "3.0 mEq/L"], correct: 2, rationale: "Hypermagnesemia occurs when serum magnesium levels exceed 2.5 mEq/L." },
            { id: 46, question: "Chvostek's sign involves tapping the:", options: ["Brachial nerve", "Facial nerve", "Radial nerve", "Tibial nerve"], correct: 1, rationale: "Chvostek's sign is elicited by tapping the facial nerve, causing a twitch in hypocalcemia." },
            { id: 47, question: "What is the oxygenation target (SpO2) in ARDS protective lung strategy?", options: ["100%", "98-100%", "88-95%", "80-85%"], correct: 2, rationale: "The target SpO2 in ARDS is typically 88-95% to avoid oxygen toxicity." },
            { id: 48, question: "Which is a risk factor for MDR VAP?", options: ["No prior antibiotics", "Hospitalization < 2 days", "Septic shock at time of VAP", "Young age"], correct: 2, rationale: "Septic shock at the onset of VAP is a risk factor for multidrug-resistant pathogens." },
            { id: 49, question: "True or False: Furosemide improves survival in AKI.", options: ["True", "False"], correct: 1, rationale: "Loop diuretics do not improve survival or renal recovery in AKI." },
            { id: 50, question: "The exudative phase of ARDS involves:", options: ["Fibrosis", "Hyaline membrane formation", "Re-epithelialization", "Fluid resorption"], correct: 1, rationale: "The exudative phase is characterized by alveolar damage and the formation of hyaline membranes." },
            { id: 51, question: "Normal Anion Gap Metabolic Acidosis is also known as:", options: ["Hyperchloremic Acidosis", "Hypochloremic Acidosis", "Normochloremic Acidosis", "Lactic Acidosis"], correct: 0, rationale: "Normal anion gap acidosis is associated with an increase in chloride to balance the lost bicarbonate." },
            { id: 52, question: "Which substance ingestion causes High Anion Gap Metabolic Acidosis?", options: ["Water", "Ethanol", "Milk", "Antacids"], correct: 1, rationale: "Ethanol (and toxic alcohols like methanol) causes a high anion gap metabolic acidosis." },
            { id: 53, question: "Respiratory compensation for metabolic acidosis begins:", options: ["Instantly", "Within minutes", "After 24 hours", "After 3 days"], correct: 1, rationale: "Respiratory compensation via hyperventilation starts within minutes of the metabolic disturbance." },
            { id: 54, question: "Renal compensation for respiratory disorders takes:", options: ["Minutes", "Hours", "2-5 days", "2 weeks"], correct: 2, rationale: "The kidneys take 2-5 days to fully compensate for respiratory acid-base disturbances." },

            { id: 56, question: "Which finding suggests dehydration?", options: ["Distended neck veins", "Bradycardia", "Poor skin turgor", "Polyuria"], correct: 2, rationale: "Poor skin turgor is a classic physical sign of volume depletion." },
            { id: 57, question: "Which fluid is best for fluid resuscitation in hypovolemic shock?", options: ["D5W", "0.45% Saline", "Isotonic Crystalloid", "Sterile Water"], correct: 2, rationale: "Isotonic crystalloids (like NS or LR) remain in the extracellular space and are effective for volume resuscitation." },
            { id: 58, question: "Permissive hypercapnia is a strategy used in:", options: ["Head injury", "ARDS", "Asthma", "Sepsis"], correct: 1, rationale: "Permissive hypercapnia allows CO2 to rise to facilitate low tidal volume ventilation in ARDS." },
            { id: 59, question: "The 'P' in the MUDPILES mnemonic stands for:", options: ["Paraldehyde", "Potassium", "Phosphate", "Penicillin"], correct: 0, rationale: "In MUDPILES, P stands for Paraldehyde." },
            { id: 60, question: "Severe hypophosphatemia is defined as:", options: ["< 2.5 mg/dL", "< 2.0 mg/dL", "< 1.5 mg/dL", "< 1.0 mg/dL"], correct: 0, rationale: "Hypophosphatemia is generally considered significant below 2.5 mg/dL, with severe often lower." },

            { id: 62, question: "Which agent is used to lower potassium by shifting it into cells?", options: ["Kayexalate", "Insulin with Glucose", "Furosemide", "Dialysis"], correct: 1, rationale: "Insulin drives potassium into cells (given with glucose to prevent hypoglycemia)." },
            { id: 63, question: "Normal serum Calcium level is approximately:", options: ["7-9 mg/dL", "9-11 mg/dL", "11-13 mg/dL", "13-15 mg/dL"], correct: 1, rationale: "The normal total serum calcium range is 9-11 mg/dL." },

            { id: 66, question: "Which gas pattern indicates Acute Respiratory Acidosis?", options: ["pH low, pCO2 high, HCO3 normal", "pH low, pCO2 low, HCO3 low", "pH high, pCO2 low, HCO3 normal", "pH normal, pCO2 high, HCO3 high"], correct: 0, rationale: "In acute respiratory acidosis, pCO2 is high and pH is low, but the kidneys haven't had time to raise HCO3 significantly." },
            { id: 67, question: "True or False: Lactated Ringers contains Potassium.", options: ["True", "False"], correct: 0, rationale: "Lactated Ringer's solution contains a small amount of potassium (approx 4 mEq/L)." },

            { id: 69, question: "The normal PaO2 on room air is:", options: ["60-80 mmHg", "70-100 mmHg", "80-120 mmHg", "90-110 mmHg"], correct: 1, rationale: "Normal arterial oxygen tension (PaO2) is 70-100 mmHg." },
            { id: 70, question: "Which condition causes Hyperchloremic Metabolic Acidosis?", options: ["Vomiting", "Diarrhea", "COPD", "Pneumonia"], correct: 1, rationale: "Diarrhea causes loss of bicarbonate, which is compensated by chloride retention, leading to hyperchloremic acidosis." },
            { id: 71, question: "Magnesium sulfate is the treatment of choice for:", options: ["Atrial Fibrillation", "Torsades de Pointes", "Hyperkalemia", "Hypercalcemia"], correct: 1, rationale: "IV Magnesium is the specific treatment for Torsades de Pointes." },
            { id: 72, question: "Which sign indicates Hypocalcemia?", options: ["Grey Turner Sign", "Cullen Sign", "Chvostek Sign", "Murphy Sign"], correct: 2, rationale: "Chvostek sign is a clinical sign of hypocalcemia." },
            { id: 73, question: "The Berlin definition for mild ARDS requires a P/F ratio of:", options: ["100-200", "200-300", "300-400", "> 400"], correct: 1, rationale: "Mild ARDS is defined as a PaO2/FiO2 ratio between 200 and 300 with PEEP >= 5." },

            { id: 77, question: "Which mode of ventilation is often used in ARDS to limit pressure?", options: ["Pressure Control", "Volume Control", "CPAP", "High Frequency Ventilation"], correct: 0, rationale: "Pressure control modes allow precise limitation of peak airway pressures." },
            { id: 78, question: "The target plateau pressure in ARDS management is:", options: ["< 20 cmH2O", "< 30 cmH2O", "< 40 cmH2O", "< 50 cmH2O"], correct: 1, rationale: "Plateau pressure should be kept below 30 cmH2O to prevent barotrauma." },
            { id: 79, question: "Normal Urine Output is approximately:", options: ["0.1 ml/kg/hr", "0.5-1.0 ml/kg/hr", "2.0 ml/kg/hr", "5.0 ml/kg/hr"], correct: 1, rationale: "0.5 ml/kg/hr is generally considered the lower limit of normal urine output." },

        // --- 2. SHUFFLE & RENDER LOGIC (DO NOT EDIT) ---
        const quizData = rawQuizData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        // Seeded Random Generator (Linear Congruential Generator)
        let seed = 12345; // Fixed seed for consistent question order
        function seededRandom() {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        // Shuffle Questions (Deterministic using seededRandom)
        for (let i = quizData.length - 1; i > 0; i--) {
            const j = Math.floor(seededRandom() * (i + 1));

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            if (!feedback.classList.contains('hidden-content')) return;
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { btn.classList.add('correct-answer'); btn.innerHTML += '<i class="fas fa-check float-right"></i>'; }
                else if (i === optIndex) { btn.classList.add('wrong-answer'); btn.innerHTML += '<i class="fas fa-times float-right"></i>'; }
                else { btn.classList.add('opacity-50'); }
            });
            if (optIndex === q.correct) score++;
            answeredCount++;
            if (answeredCount === quizData.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                document.getElementById('score-message').innerText = (score/quizData.length*100) >= 50 ? "Good Job!" : "Keep Studying";
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        };
        renderQuiz();
    </script>
</body>
</html>
