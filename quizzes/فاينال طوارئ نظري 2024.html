<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Nursing Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: default; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Styles for Essay Section */
        .essay-answer-box { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
        .essay-btn { background-color: #3b82f6; color: white; }
        .essay-btn:hover { background-color: #2563eb; }
    </style>
</head>
<body class="pb-12 bg-gray-50">
    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-blue-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fas fa-user-md text-8xl text-blue-600"></i></div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo text-center" dir="auto">Emergency final Exam 2024</h1>
            
            <div class="flex items-center justify-center gap-2 text-green-600 font-semibold bg-green-50 w-fit mx-auto px-4 py-1 rounded-full text-sm">
                <i class="fas fa-check-circle"></i> "تم صنع هذا الامتحان بواسطة عبدالحليم رزق"
            </div>
        </div>
        
        <div id="quiz-container"></div>
        
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800">Exam Completed</h2>
            <div class="mt-4 text-4xl font-bold text-blue-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display"></span>
            </div>
            <p class="text-sm text-gray-500 mb-6">(Score calculated for Multiple Choice Questions only)</p>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl hover:bg-blue-700 transition shadow-lg hover:shadow-blue-200">
                <i class="fas fa-redo mr-2"></i> Restart Exam
            </button>
        </div>
    </div>

    <script>
        // --- 1. QUESTIONS ARRAY ---
        // Answers and Rationales updated to remove textbook references
        const rawQuizData = [
            // --- MCQs from PDF ---
            {
                id: 4,
                question: "The emergency nurse assesses a patient with suspected pulmonary edema. Which of the following findings is most likely?",
                options: ["Bradycardia and dry cough", "Clear breath sounds and low oxygen saturation", "Crackles on auscultation and pink, frothy sputum", "Abdominal pain and cyanosis"],
                correct: 2,
                rationale: "A classic sign of pulmonary edema is the production of pink frothy sputum. Signs also include wheezing and crackles in the lungs."
            },
            {
                id: 5,
                question: "What is the primary nursing intervention in emergency department for a patient with acute pulmonary edema and respiratory distress?",
                options: ["Administer IV fluids rapidly", "Administer oxygen and elevate the head of the bed", "Position the patient in Trendelenburg", "Provide a high-protein diet"],
                correct: 1,
                rationale: "The patient must immediately be placed in an upright position to facilitate breathing. Administration of high concentrations of oxygen is a priority measure to improve gas exchange."
            },
            {
                id: 6,
                question: "In an emergency setting, identifying a patient at risk of pulmonary embolism involves understanding Virchow's Triad. Which of the following patients is at greatest immediate risk for thromboembolism?",
                options: ["A pregnant woman undergoing cesarean section", "A teenager with a sprained ankle", "A middle-aged man with a viral upper respiratory infection", "An elderly patient with controlled hypertension"],
                correct: 0,
                rationale: "Pregnancy increases the risk of PE. Surgery (C-section) and trauma predispose patients to venous thromboembolism (Virchow's Triad: hypercoagulability, stasis, and vessel injury)."
            },
            {
                id: 7,
                question: "Which of the following signs indicates worsening pulmonary edema and requires immediate intervention?",
                options: ["Mild dyspnea on exertion", "Decreased appetite and fatigue", "Pale skin and normal blood pressure", "Restlessness, accessory muscle use, and declining oxygen saturation"],
                correct: 3,
                rationale: "Signs of acute severe pulmonary edema include extreme shortness of breath, anxiety, restlessness (hypoxia), and accessory muscle use. Declining oxygen saturation indicates respiratory failure."
            },
            {
                id: 8,
                question: "Which of the following is the first step in the care of patients with scalp injury?",
                options: ["Cut away hair around the site", "Apply a water-moistened dressing", "Control bleeding", "Apply sterile dressing"],
                correct: 2,
                rationale: "Scalp injuries are due to excessive force and bleeding. While general wound care involves cleansing, the immediate priority in trauma/head injury is to prevent hypotension related to bleeding (Secondary Injury Prevention)."
            },
            {
                id: 9,
                question: "Which of the following medications may be used to decrease intracranial pressure in a head injured patient?",
                options: ["Antibiotics", "Beta blockers", "ACE inhibitor", "Anticonvulsants"],
                correct: 3,
                rationale: "Measures to control increased ICP include pharmacologic therapy such as Mannitol, Furosemide, Barbiturates, and <strong>Anticonvulsants</strong> (for early seizure activity, as seizures increase metabolic activity in the brain and lead to increased ICP)."
            },
            {
                id: 10,
                question: "A head-injured patient is classified as having a mild head injury if the Glasgow Coma Score (GCS) score is:",
                options: ["13-15", "9-12", "3-8", "1-2"],
                correct: 0,
                rationale: "Patients with GCS score of 13-15 are classified as having Mild head injuries. 9-12 is Moderate. 8 or less is Severe."
            },
            {
                id: 11,
                question: "Which of the following emergency action principles should be implemented first for head injured patients?",
                options: ["Insert a large venous access", "Do a secondary assessment", "Maintain airway and breathing", "Call more advanced medical personnel for help"],
                correct: 2,
                rationale: "Initial management principles for head-injured patients are: Airway, Breathing, Circulation, and Cervical spine."
            },
            {
                id: 12,
                question: "During your round on the emergency department, you found an elderly patient suffering from a bright red stool. What is the most likely cause?",
                options: ["Hemorrhoids", "Gastric ulcer", "Duodenal ulcer", "Esophageal tear"],
                correct: 0,
                rationale: "Hematochezia (bright red stools) most often signifies lower GI bleeding. Causes of Lower GI bleeding listed include <strong>Hemorrhoids</strong>. Gastric/Duodenal ulcers are usually Upper GI (melena)."
            },
            {
                id: 13,
                question: "A trauma patient was admitted to the emergency department with sudden hypotension and melena. Which of the following is the FIRST priority nursing action?",
                options: ["Document the stool color", "Start an oral proton pump inhibitor (PPI)", "Administer laxatives as ordered", "Notify the physician and begin IV fluid resuscitation"],
                correct: 3,
                rationale: "Emergency assessment and management: If unresponsive/shock, assess circulation. Establish IV access. Start fluid replacement therapy (Isotonic crystalloid/Blood) to treat hypovolemia."
            },
            {
                id: 14,
                question: "During a shift, you notice coffee-ground emesis in a patient's NGT output. Which of the following is the most likely cause of this finding?",
                options: ["Lower GI bleeding", "Fresh arterial bleeding", "Upper GI bleeding that has been in contact with gastric acid", "Melena"],
                correct: 2,
                rationale: "Hematemesis (bright red or brown 'coffee grounds' emesis), means that the blood has been in the stomach for some time and in contact with gastric HCl acid."
            },
            {
                id: 15,
                question: "Mr. X is a 60-year-old male with a history of viral hepatitis and presents with hematemesis and hypotension. What is the MOST likely cause of his upper GI bleeding?",
                options: ["Peptic ulcer", "Diverticulosis", "Esophagogastric varices", "Angiodysplasia"],
                correct: 2,
                rationale: "Esophagogastric Varices develop as a result of portal hypertension secondary to hepatic cirrhosis (common sequel of viral hepatitis)."
            },
            {
                id: 16,
                question: "During your round in Emergency room, you observed the following rhythm in a comatose patient. You quickly checked the carotid pulse and it was strongly palpable. What is your NEXT action?",
                image: "https://i.ibb.co/kVJpFx2t/image.png",
                options: ["Begin CPR immediately", "Prepare for Defibrillation", "Administer noradrenaline 1 mg IV as ordered", "Prepare for synchronized cardioversion"],
                correct: 3,
                rationale: "For V-tachycardia with pulse: Immediate <strong>synchronized cardioversion</strong> if unstable condition (altered LOC/coma). Defibrillation is for pulseless VT."
            },
            {
                id: 17,
                question: "Which of the following mechanisms of spinal cord injury is involved in the attached picture?",
                image: "https://i.ibb.co/JFHtJTFH/photo-2-2025-12-23-18-15-42.jpg",
                options: ["Distraction", "Axial Loading", "Lateral Bend", "Over rotation"],
                correct: 1,
                rationale: "Axial Loading (Compression): Occurs when a person lands on the feet or buttocks after falling or jumping, or direct blow to head (diving)."
            },
            {
                id: 18,
                question: "Which of the following respiratory concerns is highly incident in a patient with a C5 spinal cord injury?",
                options: ["Risk of pulmonary embolism", "Inability to cough effectively", "Hyperventilation", "High tidal volume"],
                correct: 1,
                rationale: "C5 injury results in reduced respiratory effort. While the diaphragm (C3-C5) is partially intact, intercostal muscles are paralyzed (T1-T11), leading to inability to cough effectively."
            },
            {
                id: 19,
                question: "Which of the following mechanisms of spinal cord injury indicates abnormal bending of head backward?",
                options: ["Hyperflexion", "Lateral Bend", "Distraction", "Hyperextension"],
                correct: 3,
                rationale: "Hyperextension: The head is bent backward, and the neck is forced into overextended position."
            },
            {
                id: 20,
                question: "Based on the rhythm observed, what is the nurse's interpretation of the patient's cardiac rhythm?",
                image: "https://i.ibb.co/rqSKZ22/photo-1-2025-12-23-18-15-42.jpg",
                options: ["ST-segment depression", "T wave inversion", "ST-segment elevation", "Pathologic Q wave"],
                correct: 2,
                rationale: "The zone of injury is recorded on the ECG as <strong>elevation of the ST segment</strong> (STEMI)."
            },
            {
                id: 21,
                question: "Which of the following is the most likely diagnosis for a patient who presents with chest pain and ST-segment depression and whose cardiac enzymes are elevated?",
                options: ["Stable angina", "Unstable angina", "STEMI", "Non-STEMI"],
                correct: 3,
                rationale: "NSTEMI is characterized by ST depression or T wave inversion with <strong>elevated biochemical cardiac markers</strong>. Unstable angina has normal enzymes."
            },
            {
                id: 22,
                question: "Based on the rhythm observed, which of the following is the correct interpretation of this patient's cardiac rhythm?",
                image: "https://i.ibb.co/JFzskRnb/photo-3-2025-12-23-18-15-42.jpg",
                options: ["T wave inversion", "ST-segment depression", "ST-segment elevation", "Pathological Q wave"],
                correct: 0,
                rationale: "T-wave inversion indicates Ischemia (repolarization impaired)."
            },
            {
                id: 23,
                question: "In people who have had a transient ischemic attack, what is the subsequent risk of stroke?",
                options: ["About 30% of patients will have a stroke within 48 hours", "About 40% of patients will have a stroke within 48 hours", "About 50% of patients will have a stroke within 48 hours", "About 60% of patients will have a stroke within 48 hours"],
                correct: 0,
                rationale: "10% to 15% of patients experiencing a TIA have a stroke within 3 months, with half of these occurring within 48 hours. (Note: Option A [30%] is the closest/lowest option provided in the exam context)."
            },
            {
                id: 24,
                question: "Mrs. M is suspected of having a subarachnoid hemorrhagic stroke; her non-contrast head CT is negative for the presence of blood. Which of the following diagnostic tests anticipate his condition?",
                options: ["Carotid Doppler", "CT with contrast", "Brain MRI", "Lumbar puncture"],
                correct: 3,
                rationale: "Lumbar puncture if the CT is negative but SAH is suspected (to detect blood in CSF)."
            },
            {
                id: 25,
                question: "Which of the following is the first physiological defense against hypoglycemia?",
                options: ["Increased glucagon secretion", "Decreased insulin secretion", "Epinephrine release", "Cortisol and growth hormone activation"],
                correct: 1,
                rationale: "The first defense against hypoglycemia is pancreatic beta-cell (<strong>insulin secretion decreases</strong>) which increases glycogenolysis... The second defense is glucagon..."
            },
            {
                id: 26,
                question: "Which of the following electrolyte imbalances needs immediate correction in patients admitted with diabetic ketoacidosis?",
                options: ["Hypokalemia", "Hyponatremia", "Hypochloremia", "Hypophosphatemia"],
                correct: 0,
                rationale: "If K+ < 3.3 mEq/L, hold insulin and give K+. Insulin drives potassium into cells, and administering it to a hypokalemic patient can cause fatal arrhythmias."
            },
            {
                id: 27,
                question: "In Hyperosmolar Hyperglycemia status, why is ketosis typically absent?",
                options: ["A complete insulin deficiency prevents lipolysis", "Residual insulin suppresses lipolysis", "Excessive glucagon secretion inhibits ketogenesis", "Hyperosmolality inhibits ketone formation"],
                correct: 1,
                rationale: "Because there is some insulin secretion, lipolysis (fat breakdown) is suppressed. (Mild or absent ketone formation)."
            },
            {
                id: 28,
                question: "In which of the following clinical contexts is magnesium sulfate considered the therapeutic agent of choice for seizure prophylaxis or management?",
                options: ["Patients with drug-resistant epileptic medications", "Postoperative intracranial patients", "Patients with ethanol withdrawal-induced seizure risk", "Hypertensive encephalopathy patients secondary to eclampsia"],
                correct: 3,
                rationale: "Magnesium sulfate is indicated for pregnant women with eclampsia."
            },
            {
                id: 29,
                question: "Which of the following most accurately characterizes the neurophysiological presentation of an atonic seizure?",
                options: ["Sustained hypertonia resulting in prolonged muscular contraction", "Brief episodes of generalized myoclonic activity", "Abrupt cessation of muscle tone leading to collapse and fall", "Complex automatisms involving spontaneous verbal expression"],
                correct: 2,
                rationale: "Atonic ('drop attacks') are characterized by sudden loss of tone, falls."
            },
            {
                id: 30,
                question: "Which of the following ions' altered permeability contributes MOST to neuron hyperexcitability?",
                options: ["Zinc and iron", "Sodium and calcium", "Magnesium and copper", "Carbon and phosphate"],
                correct: 1,
                rationale: "Ions, such as sodium (Na+), potassium (K+), calcium (Ca2+)... flow across the membrane... Hyperexcitability can result in increased random neuronal firing."
            },

            // --- ESSAY QUESTIONS (Separated at the end) ---
            {
                id: 31,
                type: "essay",
                question: "Enumerate FOUR diagnostic criteria for Hyperosmolar Hyperglycemia status.",
                options: [], // No options for essay
                correct: -1,
                rationale: "1. Blood glucose > 600 mg/dL<br>2. Arterial pH > 7.3<br>3. Serum bicarbonate > 18 mEq/L<br>4. Serum osmolality > 320 mOsm/kg<br>5. Absent or mild ketonuria"
            },
            {
                id: 32,
                type: "essay",
                question: "List FOUR nursing interventions for status epileptic patients in the aura stage.",
                options: [],
                correct: -1,
                rationale: "1. Provide privacy and protect from onlookers.<br>2. Ease the patient to the floor.<br>3. Protect the head with a pad.<br>4. Loosen constrictive clothing.<br>5. Insert an oral airway (only if aura precedes and mouth is not clenched)."
            },
            {
                id: 33,
                type: "essay",
                question: "Discusses FOUR immediate management goals for both NSTEMI and unstable angina.",
                options: [],
                correct: -1,
                rationale: "1. Bed rest / minimize oxygen demand.<br>2. Supplemental oxygen (if saturation < 92%).<br>3. Nitroglycerin (vasodilation).<br>4. Morphine sulfate (analgesia/anxiolytic).<br>5. Antiplatelet therapy (Aspirin/Clopidogrel).<br>6. Beta-blockers (decrease demand)."
            },
            {
                id: 34,
                type: "essay",
                question: "List FOUR precipitating factors for autonomic dysreflexia in patients with spinal cord injuries.",
                options: [],
                correct: -1,
                rationale: "1. Bladder distension/UTI/stones.<br>2. Bowel distension/fecal impaction.<br>3. Pressure sores.<br>4. Thrombophlebitis.<br>5. Constrictive clothing.<br>6. Exposure to heat/cold."
            },
            {
                id: 35,
                type: "essay",
                question: "List FOUR emergency assessment and management items for patients suffering Acute GIT hemorrhage.",
                options: [],
                correct: -1,
                rationale: "1. Monitor Airway, Breathing, Circulation (ABCs).<br>2. Establish IV access (two large-bore).<br>3. Start fluid replacement therapy (Isotonic crystalloids/Blood).<br>4. Insert NGT for lavage.<br>5. Insert indwelling urinary catheter.<br>6. Administer IV Proton Pump Inhibitors."
            }
        ];

        // --- 2. LOGIC ---
        // Separation logic: MCQs first, Essays last
        const mcqData = rawQuizData.filter(q => q.type !== 'essay');
        const essayData = rawQuizData.filter(q => q.type === 'essay');

        // Shuffle MCQs only
        const shuffledMCQs = mcqData.map(q => {
            const opts = q.options.map((text, i) => ({ text, isCorrect: i === q.correct }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            return { ...q, options: opts.map(o => o.text), correct: opts.findIndex(o => o.isCorrect) };
        });

        // Combine: MCQs then Essays
        const quizData = [...shuffledMCQs, ...essayData];

        const container = document.getElementById('quiz-container');
        let score = 0; let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${shuffledMCQs.length}`; // Score is out of MCQs only
            
            container.innerHTML = quizData.map((q, index) => {
                const isEssay = q.type === 'essay';
                
                // Image HTML
                let imageHtml = '';
                if (q.image && q.image.includes('INSERT')) {
                     imageHtml = `<div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center mb-4 border-2 border-dashed border-gray-300 text-gray-400">
                                    <div class="text-center">
                                        <i class="fas fa-image text-3xl mb-2"></i><br>
                                        Image Placeholder<br>
                                        <span class="text-xs">(Paste Image URL in Code: ${q.image})</span>
                                    </div>
                                  </div>`;
                } else if (q.image) {
                     imageHtml = `<img src="${q.image}" class="w-full max-h-64 object-contain mb-4 rounded-lg border border-gray-200" alt="Question Image">`;
                }

                // Render based on type
                if (isEssay) {
                    return `
                    <div class="card bg-white rounded-xl p-6 mb-6 border-l-4 border-purple-500 shadow-sm">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                            <span class="bg-purple-100 text-purple-800 text-xs font-bold px-3 py-1 rounded-full">Essay Question ${index + 1}</span>
                        </div>
                        ${imageHtml}
                        <h3 class="text-gray-800 font-bold mb-4 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                        
                        <div class="mt-4">
                            <button onclick="toggleEssayAnswer(${index})" class="essay-btn px-6 py-2 rounded-lg shadow font-medium transition focus:outline-none">
                                <i class="fas fa-eye mr-2"></i> Show Model Answer
                            </button>
                        </div>

                        <div id="feedback-${index}" class="hidden-content mt-4 essay-answer-box rounded-r-xl p-5 animate-fade-in text-left">
                            <h4 class="text-blue-800 font-bold mb-2">Model Answer / Rationale:</h4>
                            <p class="text-gray-700 text-sm leading-relaxed">${q.rationale}</p>
                        </div>
                    </div>`;
                } else {
                    // Standard MCQ
                    return `
                    <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-50 pb-3">
                            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                        </div>
                        ${imageHtml}
                        <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" style="direction: ltr; text-align: left;">${q.question}</h3>
                        <div class="grid gap-3">
                            ${q.options.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})" class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white"><span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span></button>`).join('')}
                        </div>
                        <div id="feedback-${index}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                            <p class="text-blue-800 text-sm leading-relaxed"><strong>Rationale:</strong> ${q.rationale}</p>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const q = quizData[qIndex];
            const feedback = document.getElementById(`feedback-${qIndex}`);
            const btns = document.querySelectorAll(`.option-btn-${qIndex}`);
            
            if (!feedback.classList.contains('hidden-content')) return; // Already answered
            
            feedback.classList.remove('hidden-content');
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.correct) { 
                    btn.classList.add('correct-answer'); 
                    btn.innerHTML += '<i class="fas fa-check float-right"></i>'; 
                }
                else if (i === optIndex) { 
                    btn.classList.add('wrong-answer'); 
                    btn.innerHTML += '<i class="fas fa-times float-right"></i>'; 
                }
                else { 
                    btn.classList.add('opacity-50'); 
                }
            });

            if (optIndex === q.correct) score++;
            answeredCount++;
            
            checkCompletion();
        };

        window.toggleEssayAnswer = function(index) {
            const feedback = document.getElementById(`feedback-${index}`);
            if (feedback.classList.contains('hidden-content')) {
                feedback.classList.remove('hidden-content');
            } else {
                feedback.classList.add('hidden-content');
            }
        };

        function checkCompletion() {
            if (answeredCount === shuffledMCQs.length) {
                document.getElementById('result-summary').classList.remove('hidden-content');
                document.getElementById('score-display').innerText = score;
                const percentage = (score / shuffledMCQs.length) * 100;
                document.getElementById('score-message').innerText = percentage >= 50 ? "Good Job!" : "Keep Studying";
                
                // Scroll to bottom
                setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 500);
            }
        }

        renderQuiz();
    </script>
</body>
</html>
