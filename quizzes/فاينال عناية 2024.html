                    {

                    {

                    {

                    {

                    },
                    {
                        id: 13, type: 'mcq',
                        question: "Minute ventilation is equal to...",
                        options: ["FIO2 X PEEP.", "FiO2/PEEP.", "Tidal Volume X Respiratory Rate.", "Tidal Volume/Respiratory Rate."],

                    {

                        options: ["Increase supplemental oxygen to 100% via non-rebreather mask.", "Initiate non-invasive positive pressure ventilation (NIPPV).", "Immediately intubate and mechanically ventilate.", "Start intravenous corticosteroids only."],
                        correct: 1,
                        rationale: "NIPPV (BiPAP) is the first-line intervention for COPD exacerbation with respiratory acidosis to avoid intubation."
                    }
                ]
            },
            {
                idPrefix: "essay",
                title: "Question III: Essay Questions",
                subtitle: "Think about the answer then click to reveal. (20 Marks)",
                questions: [
                    {
                        id: 41, type: 'essay',
                        question: "List 4 aggressive treatments of sepsis as a preventive treatment of ICU acquired weakness.",
                        correct: null,
                        rationale: "1. Administer broad spectrum antibiotics.<br>2. Rapid administration of crystalloid (30 ml/kg) for hypotension.<br>3. Apply vasopressors.<br>4. Strict glycemic control."
                    },
                    {
                        id: 42, type: 'essay',
                        question: "List 4 items of medical management of patient with hypernatremia.",
                        correct: null,
                        rationale: "1. Encourage patient to increase fluid intake.<br>2. Decrease sodium intake.<br>3. Consult nutritionist for free water needs.<br>4. Safety precautions if agitated/seizing."
                    },
                    {
                        id: 43, type: 'essay',
                        question: "Enumerate 4 temporary non-surgical measures for management of abdominal compartment syndrome.",
                        correct: null,
                        rationale: "1. Nasogastric tube decompression.<br>2. Rectal tube decompression/Enemas.<br>3. Analgesics and sedatives.<br>4. Paracentesis."
                    },
                    {
                        id: 44, type: 'essay',
                        question: "List 4 effects of sleep deprivation in humans.",
                        correct: null,
                        rationale: "1. Delirium and cognitive impairment.<br>2. Impaired immune function.<br>3. Cardiovascular instability.<br>4. Delayed weaning from ventilation."
                    },
                    {
                        id: 45, type: 'essay',
                        question: "Enumerate 4 environmental causes of delirium.",
                        correct: null,
                        rationale: "1. Activity and Noise.<br>2. Lights (Continuous exposure).<br>3. Sensory overload.<br>4. Sensory deprivation (Sleep deprivation)."
                    }
                ]
            }
        ];

        const container = document.getElementById('quiz-content');
        let totalScorable = 0;
        let score = 0;

        function initQuiz() {
            quizStructure.forEach((section, sIndex) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'mb-10';
                
                // Header
                sectionDiv.innerHTML = `
                    <div class="section-header">
                        <h2 class="text-xl font-bold">${section.title}</h2>
                        <p class="text-blue-100 text-sm opacity-90">${section.subtitle}</p>
                    </div>
                `;

                // Scenario if exists
                if (section.scenario) {
                    const scenarioBox = document.createElement('div');
                    scenarioBox.className = 'scenario-box';
                    scenarioBox.innerHTML = `<strong><i class="fas fa-file-medical-alt mr-2"></i>Clinical Scenario:</strong><br><p class="mt-2 text-gray-800">${section.scenario}</p>`;
                    sectionDiv.appendChild(scenarioBox);
                }

                // Questions
                section.questions.forEach((q, qIndex) => {
                    if (q.type !== 'essay') totalScorable++;
                    
                    const card = document.createElement('div');
                    card.className = 'card bg-white rounded-xl p-6 mb-6 shadow-sm border-l-4 border-l-blue-500';
                    card.id = `card-${section.idPrefix}-${q.id}`;
                    
                    // Unique DOM ID for this question instance
                    const uniqueId = `${section.idPrefix}-${q.id}`;

                    // Badge Color Logic
                    let badgeClass = 'bg-blue-100 text-blue-800';
                    let typeLabel = 'Question';
                    if(q.type === 'tf') { badgeClass = 'bg-purple-100 text-purple-800'; typeLabel = 'True/False'; }
                    if(q.type === 'essay') { badgeClass = 'bg-orange-100 text-orange-800'; typeLabel = 'Essay'; }

                    let innerHTML = `
                        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-50">
                            <span class="${badgeClass} text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">${typeLabel} ${q.id}</span>
                        </div>
                    `;

                    // Add Image Placeholder if needed
                    if (q.hasImage) {
                        innerHTML += `
                            <div class="image-placeholder group cursor-pointer hover:bg-gray-100 transition-colors">
                                <i class="fas fa-image text-4xl mb-3 text-gray-300 group-hover:text-blue-400 transition-colors hidden"></i>
                                <p class="text-sm font-bold text-gray-500 hidden">${q.imageLabel || 'Image Placeholder'}</p>
                                <p class="text-xs text-gray-400 mt-1 hidden">Right-click and inspect to add image src</p>
                                <img src="${q.imgSrc || ''}" class="w-full h-auto object-contain bg-white opacity-0 has-src:opacity-100" onload="this.classList.remove('opacity-0')">
                            </div>
                        `;
                    }

                    innerHTML += `
                        <h3 class="text-gray-800 font-bold mb-6 text-lg leading-relaxed font-cairo" dir="ltr">${q.question}</h3>
                    `;

                    if (q.type !== 'essay') {
                        // Options Grid
                        innerHTML += `<div class="grid gap-3 ${q.options.length === 2 ? 'grid-cols-1 sm:grid-cols-2' : 'grid-cols-1'}">`;
                        q.options.forEach((opt, i) => {
                            // Using uniqueId in ID and function call
                            innerHTML += `
                                <button onclick="checkAnswer('${uniqueId}', ${i}, ${q.correct})" 
                                    id="btn-${uniqueId}-${i}"
                                    class="option-btn w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-blue-50 hover:border-blue-300 focus:outline-none flex items-center justify-between group bg-white transition-all">
                                    <span class="font-medium text-gray-700 group-hover:text-blue-700 font-sans">${opt}</span>
                                </button>
                            `;
                        });
                        innerHTML += `</div>`;
                        // Feedback Area
                        innerHTML += `
                            <div id="feedback-${uniqueId}" class="hidden-content mt-6 bg-blue-50 rounded-xl p-5 border border-blue-100 animate-fade-in text-left">
                                <div class="flex gap-3">
                                    <i class="fas fa-info-circle text-blue-600 mt-1"></i>
                                    <div>
                                        <p class="font-bold text-blue-900 mb-1">Rationale:</p>
                                        <p class="text-blue-800 text-sm leading-relaxed">${q.rationale}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Essay Button
                        innerHTML += `
                            <button onclick="revealEssay('${uniqueId}')" id="essay-btn-${uniqueId}" class="essay-btn w-full text-center px-5 py-4 rounded-xl font-bold transition shadow-sm hover:shadow-md">
                                <i class="fas fa-eye mr-2"></i> Show Answer Key
                            </button>
                            <div id="feedback-${uniqueId}" class="hidden-content mt-6 bg-orange-50 rounded-xl p-5 border border-orange-100 animate-fade-in text-left">
                                <p class="text-orange-900 font-mono text-sm leading-relaxed whitespace-pre-line"><strong>Model Answer:</strong><br>${q.rationale}</p>
                            </div>
                        `;
                    }

                    card.innerHTML = innerHTML;
                    sectionDiv.appendChild(card);
                });

                container.appendChild(sectionDiv);
            });
            document.getElementById('total-display').innerText = `/ ${totalScorable}`;
        }

        window.checkAnswer = function(uniqueId, optIndex, correctIndex) {
            const feedback = document.getElementById(`feedback-${uniqueId}`);
            if (!feedback.classList.contains('hidden-content')) return; // Already answered

            feedback.classList.remove('hidden-content');
            
            // Disable all buttons for this question using uniqueId
            // We select buttons that start with btn-{uniqueId}-
            const btns = document.querySelectorAll(`[id^="btn-${uniqueId}-"]`);
            btns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === correctIndex) {
                    btn.classList.add('correct-answer', 'ring-2', 'ring-green-500', 'ring-offset-2');
                    btn.innerHTML += '<i class="fas fa-check-circle float-right text-xl"></i>';
                } else if (i === optIndex && i !== correctIndex) {
                    btn.classList.add('wrong-answer');
                    btn.innerHTML += '<i class="fas fa-times-circle float-right text-xl"></i>';
                } else {
                    btn.classList.add('opacity-50', 'grayscale');
                }
            });

            if (optIndex === correctIndex) {
                score++;
                document.getElementById('score-display').innerText = score;
            }
            
            checkCompletion();
        };

        window.revealEssay = function(uniqueId) {
            const feedback = document.getElementById(`feedback-${uniqueId}`);
            const btn = document.getElementById(`essay-btn-${uniqueId}`);
            
            if (!feedback.classList.contains('hidden-content')) return;

            feedback.classList.remove('hidden-content');
            btn.innerHTML = '<i class="fas fa-check-double mr-2"></i> Reviewed';
            btn.className = 'w-full text-center px-5 py-3 rounded-xl font-bold bg-gray-100 text-gray-500 cursor-default border border-gray-200';
            btn.disabled = true;
        };

        function checkCompletion() {
            const answered = document.querySelectorAll('.correct-answer, .wrong-answer').length;
            if (answered === totalScorable) {
                const resultSection = document.getElementById('result-summary');
                resultSection.classList.remove('hidden-content');
                resultSection.classList.add('animate-fade-in');
                
                const percent = (score / totalScorable) * 100;
                let msg = "";
                let colorClass = "";
                
                if(percent >= 90) { msg = "Outstanding! You're ready for the exam. 🌟"; colorClass="text-green-600"; }
                else if(percent >= 75) { msg = "Great job! Very strong performance. 👍"; colorClass="text-blue-600"; }
                else if(percent >= 50) { msg = "Good effort. Review the rationales for missed questions. 📚"; colorClass="text-orange-600"; }
                else { msg = "Keep studying! Focus on the rationale explanations. 💪"; colorClass="text-red-600"; }
                
                const msgEl = document.getElementById('score-message');
                msgEl.innerText = msg;
                msgEl.className = `text-lg font-bold mb-8 ${colorClass}`;

                setTimeout(() => {
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }
        }

        initQuiz();
    </script>
</body>
</html>
