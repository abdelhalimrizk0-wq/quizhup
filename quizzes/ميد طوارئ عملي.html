<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Response & Emergency Quiz (Corrected)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
        
        body { font-family: 'Noto Sans', 'Cairo', sans-serif; background-color: #f8fafc; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
        .wrong-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
        .hidden-content { display: none; }
        
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:disabled {
            cursor: default;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="pb-12 bg-gray-50">

    <div class="max-w-3xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-4 border-indigo-600 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <i class="fas fa-heartbeat text-8xl text-indigo-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2 font-cairo">Emergency midterm Quiz</h1>
            <p class="text-gray-500 font-cairo">تم صنع هذا الكويز بواسطة عبدالحليم رزق</p>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-container"></div>

        <!-- Result -->
        <div id="result-summary" class="hidden-content bg-white rounded-2xl shadow-lg p-8 text-center mt-8 border border-gray-100">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-list text-4xl text-indigo-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Quiz Completed</h2>
            <div class="mt-4 text-4xl font-bold text-indigo-600 mb-2">
                <span id="score-display">0</span> <span class="text-xl text-gray-400" id="total-display">/ 10</span>
            </div>
            <p id="score-message" class="text-gray-500 mb-6"></p>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg hover:shadow-indigo-200">
                <i class="fas fa-redo mr-2"></i> Restart Quiz
            </button>
        </div>

    </div>

    <script>
        const quizData = [
            {
                id: 1,
                question: "During a rapid response, a nurse approaches a crash cart. Upon opening the second Drawer, which of the following items are included in this Drawer?",
                options: [
                    "Atropine",
                    "Laryngoscope",
                    "Blood tubing",
                    "Ringer infusion"
                ],
                correct: 1,
                rationale: "Drawer 2 is designated for 'Breathing and Airway' equipment and contains items like Laryngoscopes, endotracheal tubes, and stylets."
            },
            {
                id: 2,
                question: "Which of the following is the correct tidaling length in the water seal tube in case of a patient with respiratory distress?",
                options: [
                    "2-16 cm",
                    "2-12 cm",
                    "2-20 cm",
                    "2-14 cm"
                ],
                correct: 2,
                rationale: "While normal tidaling is 2-12 cm, it may reach up to 20 cm during coughing, upper airway obstruction, or respiratory distress due to increased negative intrapleural pressure."
            },
            {
                id: 3,
                question: "Which one of the following abnormal rhythms is treated with an electrically synchronized shock?",
                options: [
                    "Pulseless ventricular tachycardia",
                    "Ventricular fibrillation",
                    "Asystole",
                    "Atrial flutter"
                ],
                correct: 3,
                rationale: "Synchronized cardioversion is the recommended treatment for unstable atrial tachycardia, atrial fibrillation, and atrial flutter to avoid delivering shock on the T-wave."
            },
            {
                id: 4,
                question: "What is the approximate duration of the PR interval in a normal ECG rhythm?",
                options: [
                    "0.16 seconds",
                    "0.12 seconds",
                    "0.18 seconds",
                    "0.14 seconds"
                ],
                correct: 0,
                rationale: "The normal PR interval ranges from 0.12 to 0.20 seconds (3-5 small squares). 0.16 seconds falls precisely within this normal range."
            },
            {
                id: 5,
                question: "A 65-year-old patient with chronic obstructive pulmonary disease (COPD) requires aerosolized medication during mechanical ventilation. Which of the following devices is appropriate to use for this patient?",
                options: [
                    "Soft mist inhaler",
                    "Ultrasonic nebulizer",
                    "Jet nebulizer",
                    "In-line nebulizer"
                ],
                correct: 3,
                rationale: "The In-line nebulizer is specifically designed to be connected to the breathing circuit to deliver medication to patients who are being mechanically ventilated."
            },
            {
                id: 6,
                question: "All of the following are correct nursing actions in the application of a cardiac monitor EXCEPT:",
                options: [
                    "Dry the electrode site before use",
                    "Place the electrode over the bony prominence",
                    "Opening the electrode package immediately before use",
                    "Make sure all electrical outlets are grounded"
                ],
                correct: 1,
                rationale: "Electrodes should not be placed over bony prominences, hairy locations, or areas for chest compression because this interferes with signal conduction."
            },
            {
                id: 7,
                question: "What is the recommended external paddle electrode diameter for adults?",
                options: [
                    "11 cm",
                    "13 cm",
                    "14 cm",
                    "12 cm"
                ],
                correct: 1,
                rationale: "The optimal external paddle electrode diameter for adults is 13 cm to ensure effective current delivery."
            },
            {
                id: 8,
                question: "During a cardiac arrest scenario, which of the following sets of drugs is appropriately given via the endotracheal tube route according to standard resuscitation protocols?",
                options: [
                    "Neuril, Aspirin, Valium, Epinephrine, Lidocaine",
                    "Narcan, Atropine, Valium, Epinephrine, Lidocaine",
                    "Nifedipine, Atropine, Verapamil, Epinephrine, Lasix",
                    "Nystatin, Amiodarone, Vasopressin, Ergometrine, Lorazepam"
                ],
                correct: 1,
                rationale: "The mnemonic NAVEL stands for the drugs that can be given via ETT: Narcan, Atropine, Valium, Epinephrine, and Lidocaine."
            },
            {
                id: 9,
                question: "Which of the following breathing patterns best describes as a cycle in which respirations gradually wax and wane in a regular pattern, increasing in rate and depth, and then decreasing?",
                options: [
                    "Cheyne-Stokes respiration",
                    "Apneustic breathing",
                    "Kussmaul breathing",
                    "Biot’s respiration"
                ],
                correct: 0,
                rationale: "Cheyne-Stokes respiration is defined as a cycle in which respirations gradually wax and wane in a regular pattern, increasing in rate and depth and then decreasing, followed by apnea."
            },
            {
                id: 10,
                question: "Which of the following findings indicated Letter P in the AVPU mnemonic?",
                options: [
                    "Pain",
                    "Patient",
                    "Pink",
                    "Pallor"
                ],
                correct: 0,
                rationale: "In the AVPU consciousness assessment, 'P' stands for Pain, meaning the patient responds only when a painful stimulus is applied."
            }
        ];

        const container = document.getElementById('quiz-container');
        let score = 0;
        let answeredCount = 0;

        function renderQuiz() {
            document.getElementById('total-display').innerText = `/ ${quizData.length}`;
            
            container.innerHTML = quizData.map((q, index) => `
                <div class="card bg-white rounded-xl p-6 mb-6 border border-gray-100 relative">
                    <span class="absolute top-4 right-4 bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1 rounded-full">Question ${index + 1}</span>
                    
                    <h3 class="text-gray-800 font-bold mb-6 text-lg pr-8 leading-relaxed mt-4">${q.question}</h3>
                    
                    <div class="grid gap-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${index}, ${i})" 
                                class="option-btn option-btn-${index} w-full text-left px-5 py-4 rounded-xl border border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 focus:outline-none flex items-center justify-between group bg-white">
                                <span class="font-medium text-gray-700 group-hover:text-indigo-700">${opt}</span>
                                <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-indigo-400">
                                    <div class="w-2.5 h-2.5 rounded-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition"></div>
                                </div>
                            </button>
                        `).join('')}
                    </div>

                    <div id="feedback-${index}" class="hidden-content mt-6 bg-indigo-50 rounded-xl p-5 border border-indigo-100 animate-fade-in">
                        <div class="flex items-start gap-3">
                            <i class="fas fa-info-circle text-indigo-500 mt-1"></i>
                            <div>
                                <p class="font-bold text-indigo-900 text-sm mb-1">Rationale</p>
                                <p class="text-indigo-800 text-sm leading-relaxed">${q.rationale}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.checkAnswer = function(qIndex, optIndex) {
            const question = quizData[qIndex];
            const feedbackEl = document.getElementById(`feedback-${qIndex}`);
            const buttons = document.querySelectorAll(`.option-btn-${qIndex}`);
            
            if (feedbackEl.classList.contains('block')) return; 

            feedbackEl.classList.remove('hidden-content');
            feedbackEl.classList.add('block');

            buttons.forEach((btn, i) => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-indigo-50', 'hover:border-indigo-300', 'bg-white');
                
                const iconContainer = btn.lastElementChild;
                
                if (i === question.correct) {
                    btn.classList.add('correct-answer');
                    iconContainer.innerHTML = '<i class="fas fa-check text-green-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else if (i === optIndex) {
                    btn.classList.add('wrong-answer');
                    iconContainer.innerHTML = '<i class="fas fa-times text-red-600"></i>';
                    iconContainer.classList.remove('border-2', 'border-gray-300');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            answeredCount++;
            if (optIndex === question.correct) score++;

            if (answeredCount === quizData.length) {
                const resultDiv = document.getElementById('result-summary');
                resultDiv.classList.remove('hidden-content');
                document.getElementById('score-display').textContent = score;
                
                const messageEl = document.getElementById('score-message');
                const percentage = (score / quizData.length) * 100;

                if (percentage === 100) messageEl.textContent = "Perfect! You mastered these concepts.";
                else if (percentage >= 75) messageEl.textContent = "Excellent work!";
                else if (percentage >= 50) messageEl.textContent = "Good job, check the rationales for mistakes.";
                else messageEl.textContent = "Review the rationales carefully to improve.";
                
                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 500);
            }
        };

        renderQuiz();
    </script>
</body>
</html>
